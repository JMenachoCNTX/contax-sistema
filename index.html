function renderNotasEEFF(c){
  const cfg=emp().cfg;const tr=emp().traspaso;
  const{gs,tI,tG,util,tA,tP,tPT}=c;
  const year=cfg.fechaFin?cfg.fechaFin.split('-')[0]:'';
  const caja=r2(gs('111001001'));const banco=r2(gs('111002001'));
  const cfIva=r2(gs('116001001'));const iuePagar=r2(gs('214006001'));
  
  function nota(num,titulo,contenido){
    return '<div style="margin-bottom:16px;break-inside:avoid">'+
      '<div style="font-size:13px;font-weight:700;color:#031740;border-bottom:2px solid #031740;padding-bottom:4px;margin-bottom:8px">'+
        'NOTA '+num+'. '+titulo.toUpperCase()+
      '</div>'+
      '<div style="font-size:11px;line-height:1.6;color:#0D0D0D">'+contenido+'</div>'+
    '</div>';
  }
  function row2(a,b){return '<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #eee"><span>'+a+'</span><span><strong>'+b+'</strong></span></div>';}

  return '<div style="max-width:800px">'+
    '<div style="text-align:center;margin-bottom:24px">'+
      '<div style="font-size:16px;font-weight:700;color:#031740">'+cfg.razonSocial+'</div>'+
      '<div style="font-size:12px;color:#555">NIT: '+cfg.nit+' | Actividad: '+cfg.actividad+'</div>'+
      '<div style="font-size:14px;font-weight:600;color:#031740;margin-top:8px">NOTAS A LOS ESTADOS FINANCIEROS</div>'+
      '<div style="font-size:11px;color:#555">Correspondientes al período finalizado al '+isoToLocal(cfg.fechaFin)+'</div>'+
      '<div style="font-size:11px;color:#555">(Expresado en Bolivianos)</div>'+
    '</div>'+

    nota(1,'Información General',
      '<p>'+cfg.razonSocial+' es una empresa establecida en Bolivia, registrada bajo el NIT '+cfg.nit+
      '. Su actividad principal consiste en '+cfg.actividad+'. Los presentes estados financieros corresponden al período comprendido entre el '+
      isoToLocal(cfg.fechaInicio)+' y el '+isoToLocal(cfg.fechaFin)+' (Gestión '+year+').</p>'
    )+

    nota(2,'Bases de Preparación',
      '<p>Los estados financieros han sido preparados de acuerdo con los Principios de Contabilidad Generalmente Aceptados (PCGA) '+
      'vigentes en Bolivia y las normas establecidas por el Servicio de Impuestos Nacionales (SIN). Los valores están expresados en Bolivianos (Bs.).</p>'+
      '<p style="margin-top:4px">La empresa aplica el método del costo histórico para la valuación de sus activos, ajustados por la variación de la Unidad de Fomento a la Vivienda (UFV) '+
      'conforme lo establece la legislación tributaria boliviana.</p>'
    )+

    nota(3,'Principales Políticas Contables',
      '<p><strong>a) Efectivo y equivalentes:</strong> Se registran a su valor nominal en moneda nacional.</p>'+
      '<p style="margin-top:3px"><strong>b) Crédito Fiscal IVA:</strong> Representan el IVA soportado en compras, aplicable como crédito contra el Débito Fiscal generado en ventas (Ley 843).</p>'+
      '<p style="margin-top:3px"><strong>c) Activos Fijos:</strong> Se registran al costo de adquisición, actualizados con la variación UFV del período. La depreciación se calcula por el método de línea recta a las tasas establecidas por el SIN.</p>'+
      '<p style="margin-top:3px"><strong>d) Impuesto a las Transacciones (IT):</strong> Se liquida mensualmente a la tasa del 3% sobre ingresos brutos.</p>'+
      '<p style="margin-top:3px"><strong>e) Impuesto al Valor Agregado (IVA):</strong> Se liquida mensualmente. El IVA incluido en ventas (DF) se compensa con el CF de compras. La diferencia a favor se cancela con caja.</p>'+
      '<p style="margin-top:3px"><strong>f) Impuesto sobre las Utilidades (IUE):</strong> Se aplica el 25% sobre la utilidad tributaria de la gestión.</p>'
    )+

    nota(4,'Efectivo y Equivalentes de Efectivo',
      row2('Caja Moneda Nacional',fmt(caja)+' Bs')+
      row2('Banco',fmt(banco)+' Bs')+
      '<div style="display:flex;justify-content:space-between;padding:5px 0;border-top:2px solid #031740;font-weight:700"><span>TOTAL</span><span>'+fmt(r2(caja+banco))+' Bs</span></div>'+
      '<p style="margin-top:6px;font-size:10px;color:#555">El saldo de caja corresponde al efectivo disponible al cierre del período '+isoToLocal(cfg.fechaFin)+'. Los fondos en bancos están depositados en entidades financieras bolivianas reguladas por la ASFI.</p>'
    )+

    nota(5,'Crédito Fiscal IVA',
      row2('Saldo inicial CF IVA',fmt(pn(tr.cfIva||0))+' Bs')+
      row2('CF generado en compras del período',fmt(r2(cfIva-pn(tr.cfIva||0)))+' Bs')+
      '<div style="display:flex;justify-content:space-between;padding:5px 0;border-top:2px solid #031740;font-weight:700"><span>SALDO CF IVA AL CIERRE</span><span>'+fmt(cfIva)+' Bs</span></div>'+
      '<p style="margin-top:6px;font-size:10px;color:#555">El Crédito Fiscal IVA proviene del 13% del monto neto de las compras gravadas. Se aplica mensualmente contra el Débito Fiscal. El saldo al cierre está disponible para compensaciones futuras.</p>'
    )+

    nota(6,'Activos Fijos',
      '<p>Los activos fijos se detallan en el Cuadro de Activos Fijos adjunto. Todos los bienes son propiedad de la empresa y se encuentran libres de gravámenes. Las tasas de depreciación aplicadas son las establecidas por el SIN:</p>'+
      '<div style="margin-top:6px">'+
      row2('Vehículos','20% anual')+row2('Muebles y Enseres','10% anual')+
      row2('Equipos de Computación','25% anual')+row2('Equipos de Comunicación','20% anual')+
      row2('Equipo de Oficina','10% anual')+row2('Equipo Electrónico','25% anual')+'</div>'
    )+

    nota(7,'Impuestos por Pagar',
      row2('Débito Fiscal IVA',fmt(gs('214001001'))+' Bs')+
      row2('IT Por Pagar',fmt(gs('214004001'))+' Bs')+
      row2('IUE Por Pagar',fmt(iuePagar)+' Bs')+
      '<div style="display:flex;justify-content:space-between;padding:5px 0;border-top:2px solid #031740;font-weight:700"><span>TOTAL OBLIGACIONES TRIBUTARIAS</span><span>'+fmt(r2(gs('214001001')+gs('214004001')+iuePagar))+' Bs</span></div>'+
      '<p style="margin-top:6px;font-size:10px;color:#555">Corresponden a las obligaciones tributarias al cierre del período, pendientes de declaración y pago.</p>'
    )+

    nota(8,'Resultado de la Gestión',
      row2('Total Ingresos',fmt(tI)+' Bs')+
      row2('(-) Total Gastos',fmt(tG)+' Bs')+
      '<div style="display:flex;justify-content:space-between;padding:5px 0;border-top:2px solid #031740;font-weight:700"><span>'+(util>=0?'UTILIDAD':'PÉRDIDA')+' DE LA GESTIÓN</span><span>'+fmt(Math.abs(util))+' Bs</span></div>'+
      '<p style="margin-top:6px;font-size:10px;color:#555">El resultado de la gestión ha sido determinado conforme a los principios contables aplicados consistentemente.</p>'
    )+

    nota(9,'Hechos Posteriores',
      '<p>Al momento de la preparación de estos estados financieros, la administración de '+cfg.razonSocial+
      ' no tiene conocimiento de hechos ocurridos con posterioridad al cierre del período ('+isoToLocal(cfg.fechaFin)+
      ') que pudieran afectar significativamente los presentes estados financieros.</p>'
    )+

    '<div style="margin-top:32px;display:grid;grid-template-columns:1fr 1fr;gap:40px;break-inside:avoid">'+
      '<div style="text-align:center">'+
        '<div style="border-top:2px solid #031740;padding-top:8px;font-weight:700;font-size:12px;color:#031740">'+cfg.contadorNombre+'</div>'+
        '<div style="font-size:10px;color:#555">CI: '+cfg.contadorCI+'</div>'+
        '<div style="font-size:10px;color:#555">Contador</div>'+
      '</div>'+
      '<div style="text-align:center">'+
        '<div style="border-top:2px solid #031740;padding-top:8px;font-weight:700;font-size:12px;color:#031740">'+cfg.razonSocial+'</div>'+
        '<div style="font-size:10px;color:#555">NIT: '+cfg.nit+'</div>'+
        '<div style="font-size:10px;color:#555">Representante Legal</div>'+
      '</div>'+
    '</div>'+
  '</div>';
}

// ══ EXPORT WORD (Notas en HTML-Word format) ═════════════
function exportNotasWord(){
  const c=calcAll();const cfg=emp().cfg;
  const body=renderNotasEEFF(c);
  const wordHtml='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word">'+
    '<head><meta charset="utf-8">'+
    '<style>body{font-family:Calibri,sans-serif;font-size:11pt;margin:2.5cm}h1{font-size:16pt;color:#031740}'+
    'table{border-collapse:collapse;width:100%}td{padding:4pt 6pt}</style></head>'+
    '<body>'+body+'</body></html>';
  const blob=new Blob([wordHtml],{type:'application/msword'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='Notas_EEFF_'+cfg.razonSocial+'_'+cfg.gestion+'.doc';
  a.click();URL.revokeObjectURL(a.href);
}

    else if(S.tab==='ee')main=renderEE(c);

    else if(S.tab==='cuadroaf')main=renderCuadroAF();
    else if(S.tab==='notas')main=renderNotasEEFF(c);

re();
</script>
