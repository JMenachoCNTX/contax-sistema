<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">

<title>CONTAX Sistema Contable v2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F2F2F2;font-family:'Segoe UI',sans-serif;background:#F2F2F2;color:#0D0D0D;font-size:13px}
.hdr{background:#031740;color:#fff;padding:10px 18px;display:flex;align-items:center;gap:12px;border-bottom:3px solid #3B82F6;position:sticky;top:0;z-index:100}
.logo{background:#3B82F6;border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;cursor:pointer}
.hdr-r{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ok{color:#4ADE80;font-weight:700}.err{color:#F87171;font-weight:700}
.layout{display:flex;height:calc(100vh - 50px)}
.nav{width:185px;background:#031740;overflow-y:auto;flex-shrink:0;padding:6px 0;transition:width .25s ease,padding .25s ease}
.nav.collapsed{width:0;padding:0;overflow:hidden}
.nav-toggle{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:18px;padding:0;line-height:1;flex-shrink:0}
.nav-toggle:hover{color:#fff}
.ns{padding:10px 14px 3px;font-size:9px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.08em}
.ni{padding:8px 14px;cursor:pointer;font-size:12px;color:rgba(255,255,255,.55);border-left:3px solid transparent;display:flex;align-items:center;gap:7px}
.ni.a{background:rgba(59,130,246,.25);color:#fff;border-left-color:#3B82F6;font-weight:600}
.ni:hover:not(.a){color:rgba(255,255,255,.85);background:rgba(255,255,255,.07)}
.nsumm{padding:8px 14px;font-size:10px;color:rgba(255,255,255,.4);border-top:1px solid rgba(255,255,255,.1);margin-top:6px}
.nsumm div{color:rgba(255,255,255,.55);margin-top:2px}
.cnt{flex:1;padding:16px;overflow-y:auto}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.h2{font-size:14px;font-weight:700;color:#1C2B4B;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid #E8EAED}
.h3{font-size:11px;font-weight:700;color:#1C2B4B;margin:12px 0 7px;background:#EEF2FF;padding:4px 8px;border-radius:4px;text-transform:uppercase}
label{font-size:11px;font-weight:600;color:#555;display:block;margin-bottom:3px}
input,select,textarea{background:#FFFDE7;border:1.5px solid #F9A825;border-radius:5px;padding:5px 8px;font-size:12px;width:100%;outline:none;font-family:inherit;color:#0D0D0D}
input:focus,select:focus,textarea:focus{border-color:#3B82F6}
.ro{background:#F5F5F5!important;border-color:#DDD!important;color:#777;pointer-events:none}
textarea{height:150px;resize:vertical;font-family:monospace;font-size:11px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.btn{background:#031740;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer}
.btn-blue{background:#3B82F6;color:#fff;border:none;border-radius:5px;padding:5px 11px;font-size:11px;cursor:pointer}
.btn-del{background:#EF4444;color:#fff;border:none;border-radius:4px;padding:4px 8px;font-size:11px;cursor:pointer}
.btn-green{background:#10B981;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer}
.btn-orange{background:#F59E0B;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer}
.btn-purple{background:#7C3AED;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer}
.sep{height:1px;background:#E8EAED;margin:12px 0}
.info{padding:9px 12px;border-radius:7px;font-size:11px;margin-top:8px}
.ig{background:#F0FDF4;border:1px solid #BBF7D0;color:#065F46}
.ir{background:#FFF5F5;border:1px solid #FCA5A5;color:#991B1B}
.ib{background:#EFF6FF;border:1px solid #BFDBFE;color:#1E40AF}
.iy{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E}
.tab-bar{display:flex;gap:3px;margin-bottom:14px;background:#E8EAED;padding:3px;border-radius:7px;flex-wrap:wrap}
.tab-btn{padding:5px 12px;border-radius:5px;font-size:11px;cursor:pointer;border:none;background:transparent;color:#666;font-weight:500}
.tab-btn.a{background:#fff;color:#1C2B4B;font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.1)}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#031740;color:#fff;padding:6px 8px;font-size:10px;font-weight:600;text-align:left;white-space:nowrap}
th.r{text-align:right}
td{padding:5px 8px;border-bottom:1px solid #F0F2F5}
td.r{font-family:'Courier New',monospace;text-align:right;white-space:nowrap}
td.mono{font-family:monospace;font-size:10px}
.tr-g{background:#EEF2FF;font-weight:600;color:#1C2B4B}
.tr-t{background:#E8F4FD;font-weight:700}
.tr-f{background:#031740;color:#fff;font-weight:700}
.tr-f td{border:none;color:#fff}
.tr-i{background:#D1FAE5}.tr-i td{color:#065F46;font-weight:700}
.tr-e{background:#FEE2E2}.tr-e td{color:#991B1B;font-weight:700}
.bok{background:#D1FAE5}.ber{background:#FEE2E2}
.cok{color:#059669;font-weight:700}.cer{color:#DC2626;font-weight:700}
.badge-ok{background:#D1FAE5;color:#065F46;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.badge-err{background:#FEE2E2;color:#991B1B;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.badge-warn{background:#FEF3C7;color:#92400E;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.ee-hdr{text-align:center;margin-bottom:12px}
.ee-title{font-weight:700;font-size:14px;color:#1C2B4B}
.ee-sub{font-size:11px;color:#555;margin-top:2px}
.tbl-wrap{max-height:460px;overflow-y:auto}
.nota{font-size:10px;color:#888;margin:4px 0 8px}
.asiento{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:12px;margin-bottom:10px}
.asiento-hdr{font-weight:700;font-size:12px;color:#1C2B4B;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.emp-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center}
.emp-box{background:#fff;border-radius:12px;padding:20px;width:500px;max-height:80vh;overflow-y:auto}
.emp-item{padding:10px 14px;border-radius:8px;border:1px solid #E2E8F0;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.emp-item:hover{background:#EEF2FF;border-color:#3B82F6}
.emp-item.ea{background:#EEF2FF;border-color:#3B82F6;font-weight:700}
input.n{text-align:right}
input.g{background:#F0FDF4!important;border:1.5px solid #10B981!important;text-align:right}
input.g:focus{border-color:#059669!important;box-shadow:0 0 0 2px rgba(16,185,129,.15)!important}
.auto-card{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:10px;margin-bottom:8px}
.auto-card-hdr{font-size:11px;font-weight:700;color:#1E40AF;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.auto-row{display:grid;grid-template-columns:100px 1fr 120px 120px;gap:6px;margin-bottom:3px;align-items:center;font-size:11px}
.prog-bar{background:#E8EAED;border-radius:10px;height:8px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;border-radius:10px;transition:width .3s}
/* Dark charts */
.dark-card{background:#031740;border-radius:12px;padding:16px;color:#fff;margin-bottom:12px}
.dark-chart-title{font-size:11px;font-weight:700;color:#94A3B8;margin-bottom:12px;text-transform:uppercase;letter-spacing:.06em}
.kpi-circle{display:flex;flex-direction:column;align-items:center;justify-content:center;width:90px;height:90px;border-radius:50%;border:3px solid;position:relative}
.kpi-value{font-size:20px;font-weight:700}
.kpi-label{font-size:9px;opacity:.7;margin-top:2px;text-align:center}
/* Login screen */
.login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#0D1B2A,#1C2B4B);z-index:1000;display:flex;align-items:center;justify-content:center}
.login-box{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:32px;width:480px;max-height:85vh;overflow-y:auto}
.user-avatar{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;border:3px solid transparent;transition:all .2s;margin:0 auto 8px}
.user-avatar.sel{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.3)}
.user-card{text-align:center;padding:12px 8px;cursor:pointer;border-radius:8px;transition:all .2s;border:1px solid transparent}
.user-card:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}
.user-card.sel{background:rgba(59,130,246,.2);border-color:#3B82F6}
.new-user-form{background:rgba(255,255,255,.05);border-radius:10px;padding:16px;margin-top:12px}
/* Floating chat */
.chat-fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;background:linear-gradient(135deg,#3B82F6,#7C3AED);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:500;box-shadow:0 4px 20px rgba(59,130,246,.5);font-size:22px;border:none;color:#fff;transition:transform .2s}
.chat-fab:hover{transform:scale(1.1)}
.chat-float{position:fixed;bottom:86px;right:24px;width:360px;height:480px;background:#031740;border-radius:16px;z-index:500;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5);border:1px solid rgba(59,130,246,.3);overflow:hidden}
.chat-float-hdr{background:linear-gradient(135deg,#1C2B4B,#3B82F6);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;color:#fff;font-weight:700;font-size:13px}
.chat-float-body{flex:1;overflow-y:auto;padding:12px;background:#031740}
.chat-float-inp{display:flex;gap:6px;padding:10px;background:#031740;border-top:1px solid rgba(255,255,255,.1)}
.chat-float-inp input{flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:7px 10px;font-size:12px;color:#fff;outline:none}
.chat-float-inp input::placeholder{color:rgba(255,255,255,.4)}

/* Searchable dropdown */
.sd-wrap{position:relative;width:100%}
.sd-input{width:100%;background:#F0FDF4;border:1.5px solid #10B981;border-radius:5px;padding:5px 8px;font-size:12px;color:#0D0D0D;outline:none;font-family:inherit}
.sd-input.yellow{background:#FFFDE7!important;border-color:#F9A825!important}
.sd-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid #031740;border-radius:5px;z-index:300;max-height:200px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.15);margin-top:2px}
.sd-item{padding:6px 10px;cursor:pointer;font-size:11px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #F2F2F2}
.sd-item:hover{background:#EEF2FF}
.sd-code{font-family:monospace;font-size:10px;color:#77888C;flex-shrink:0;min-width:80px}
.sd-name{color:#0D0D0D}

/* Print */
@media print{
  .nav,.hdr,.chat-fab,.chat-float,.login-overlay,.hdr-r,.btn,.btn-blue,.btn-green,.btn-orange,.btn-del,.btn-purple{display:none!important}
  .layout{height:auto!important}
  .cnt{padding:0!important}
  .card{box-shadow:none!important;break-inside:avoid}
  body{font-size:11px}
}
</style>

function parseRCV(txt){
  if(!txt||!txt.trim())return[];
  return txt.trim().split('\n').map(r=>{
    const c=r.split('\t');
    return{nro:c[0]?.trim(),nit:c[1]?.trim(),razon:c[2]?.trim(),fecha:c[6]?.trim(),
      total:pn(c[7]),ice:pn(c[8]),iehd:pn(c[9]),ipj:pn(c[10]),tasas:pn(c[11]),
      noSujeto:pn(c[12]),exentos:pn(c[13]),baseCF:pn(c[18]),cf:pn(c[19]),
      derechoCF:c[22]?.trim(),estado:c[23]?.trim(),cat:c[24]?.trim()};
  }).filter(r=>r.nro&&!isNaN(parseFloat(r.nro)));
}

function nitLookup(nit){
  return (S.nits||[]).find(n=>String(n.nit)===String(nit));
}

function buildM(entries){
  const M={};
  const add=(c,d,h)=>{if(!c)return;if(!M[c])M[c]={debe:0,haber:0};M[c].debe=r2(M[c].debe+r2(d||0));M[c].haber=r2(M[c].haber+r2(h||0));};
  entries.forEach(e=>(e.lines||[]).forEach(l=>add(l.c,l.d,l.h)));
  Object.keys(M).forEach(k=>{
    const{debe,haber}=M[k],t=acctTipo(k);
    M[k].saldo=(t==='A'||t==='G')?r2(debe-haber):r2(haber-debe); // I,P,PT = haber-debe
    M[k].sD=r2(Math.max(0,debe-haber));M[k].sH=r2(Math.max(0,haber-debe));
  });
  return M;
}

function genEntries(){

  const ui=pn(e.cfg.ufvInicio),uf=pn(e.cfg.ufvFin);

  // ASIENTO DE APERTURA
  const aL=[];
  const addA=(c,d,h)=>{if(c&&(d||h))aL.push({c,d:r2(d||0),h:r2(h||0)});};
  addA('111001001',tr.caja,0);addA('111002001',tr.banco,0);
  addA('116001001',tr.cfIva,0);addA('116006001',tr.iueComp,0);
  addA('123003001',tr.vehiculo,0);addA('124001001',0,Math.abs(tr.depVehiculo||0));
  addA('123004001',tr.muebles,0);addA('124001002',0,Math.abs(tr.depMuebles||0));
  addA('123006001',tr.equComp,0);addA('124001003',0,Math.abs(tr.depEquComp||0));
  addA('123007001',tr.equCom,0);addA('124001004',0,Math.abs(tr.depEquCom||0));
  addA('123009001',tr.equOficina,0);addA('124001005',0,Math.abs(tr.depEquOficina||0));
  addA('123010001',tr.equElec,0);addA('124001006',0,Math.abs(tr.depEquElec||0));
  addA('212003001',0,tr.prestamos);addA('214001001',0,tr.dfIva);
  addA('214004001',0,tr.itPagar);addA('214006001',0,tr.iuePagar);
  addA('214026001',0,tr.multas);addA('311001001',0,tr.capitalSocial);
  addA('311002001',0,tr.ajusteCapital);addA('313001001',0,tr.resAcum);
  (e.extraApertura||[]).forEach(function(ea){if(!ea.cuenta||!ea.monto)return;const tp2=acctTipo(ea.cuenta);const mt2=r2(pn(ea.monto));if(tp2==='A'||tp2==='G')aL.push({c:ea.cuenta,d:mt2,h:0});else aL.push({c:ea.cuenta,d:0,h:mt2});});
  if(aL.length)E.push({id:'APE',tipo:'T',desc:'ASIENTO DE APERTURA',lines:aL});

  // OTROS ASIENTOS
  (e.otrosAsientos||[]).forEach((oa,i)=>{
    if(!oa.activo)return;
    const lines=[];
    (oa.lines||[]).forEach(l=>{
      const v=pn(l.v);if(!l.c||!v)return;
      lines.push({c:l.c,d:l.t==='D'?v:0,h:l.t==='H'?v:0});
    });
    if(lines.length)E.push({id:'OA'+i,tipo:'T',desc:oa.nombre,lines});
  });

  // RCV EGRESOS — usa archivo cargado O datos pegados
  // rcvData (XLSX, filtrado INTERNO/GRAVADAS) tiene prioridad sobre rcvTxt (paste)
  const rcvFromXLSX=(e.rcvData||[]);
  const rcvFromPaste=parseRCV(e.rcvTxt||'').filter(r=>r.estado==='CONSOLIDADO');
  const rcvFull=rcvFromXLSX.length>0?rcvFromXLSX:rcvFromPaste;
  const valid=rcvFull;
  if(valid.length){
    const con={};
    const add2=(c,d,h)=>{if(!con[c])con[c]={d:0,h:0};con[c].d=r2(con[c].d+(d||0));con[c].h=r2(con[c].h+(h||0));};
    valid.forEach(r=>{
      const overrides=e.rcvOverrides||{};
      const fullIdx=rcvFull.indexOf(r);
      const lk=nitLookup(r.nit);
      const autoCode=lk?lk.cuenta:(CAT_MAP[r.cat?.trim()]||'526002001');
      const code=overrides[fullIdx]||autoCode;
      const totalN=r2(r.total-r.ice-r.iehd-r.ipj-r.tasas);
      let gastoAmt,cfAmt;
      if(r.noSujeto>0){
        // COMBUSTIBLE: 30% no sujeto + 70% base
        const base70=r2(totalN*0.70);
        cfAmt=r.derechoCF==='SI'?r2(base70*0.13):0;
        gastoAmt=r2(r.noSujeto+base70*0.87);
      } else {
        cfAmt=r.derechoCF==='SI'?r2(totalN*0.13):0;
        gastoAmt=r2(totalN*0.87);
      }
      add2(code,gastoAmt,0);
      if(cfAmt)add2('116001001',cfAmt,0);
      add2('111001001',0,totalN);
    });
    // Balancear diferencia de redondeo
    const td=r2(Object.values(con).reduce((s,v)=>r2(s+v.d),0));
    const th=r2(Object.values(con).reduce((s,v)=>r2(s+v.h),0));
    const diff=r2(td-th);
    if(Math.abs(diff)>0.001){
      if(diff>0){if(!con['561004001'])con['561004001']={d:0,h:0};con['561004001'].h=r2((con['561004001'].h||0)+diff);}
      else{if(!con['441004001'])con['441004001']={d:0,h:0};con['441004001'].d=r2((con['441004001'].d||0)-diff);}
    }
    E.push({id:'RCVE',tipo:'E',desc:'COMPROBANTE DE EGRESOS — RCV COMPRAS',lines:Object.entries(con).map(([c,v])=>({c,d:v.d,h:v.h}))});
  }

  // INGRESOS XLSX (ventas cargadas)
  const ventasXLSX=e.ventasData||[];
  if(ventasXLSX.length>0){
    const conV={};
    ventasXLSX.forEach((v,i)=>{
      const cuenta=(e.ventasOverrides&&e.ventasOverrides[i])||'411002004';
      const tot=r2(v.total);
      const ingNeto=r2(tot*0.87);
      const dfIva=r2(tot*0.13);
      const it=r2(tot*0.03);
      if(!conV['111001001'])conV['111001001']={d:0,h:0};conV['111001001'].d=r2(conV['111001001'].d+tot);
      if(!conV[cuenta])conV[cuenta]={d:0,h:0};conV[cuenta].h=r2(conV[cuenta].h+ingNeto);
      if(!conV['214001001'])conV['214001001']={d:0,h:0};conV['214001001'].h=r2(conV['214001001'].h+dfIva);
      if(!conV['525002001'])conV['525002001']={d:0,h:0};conV['525002001'].d=r2(conV['525002001'].d+it);
      if(!conV['214004001'])conV['214004001']={d:0,h:0};conV['214004001'].h=r2(conV['214004001'].h+it);
    });
    const tdV=r2(Object.values(conV).reduce((s,v)=>r2(s+v.d),0));
    const thV=r2(Object.values(conV).reduce((s,v)=>r2(s+v.h),0));
    const diffV=r2(tdV-thV);
    if(Math.abs(diffV)>0.001){if(diffV>0){if(!conV['561004001'])conV['561004001']={d:0,h:0};conV['561004001'].h=r2((conV['561004001'].h||0)+diffV);}else{if(!conV['441004001'])conV['441004001']={d:0,h:0};conV['441004001'].d=r2((conV['441004001'].d||0)-diffV);}}
    E.push({id:'VXLS',tipo:'I',desc:'COMPROBANTE DE INGRESOS — VENTAS (XLSX)',lines:Object.entries(conV).map(([c,v])=>({c,d:v.d,h:v.h}))});
  }

  // INGRESOS MANUALES — 87% ingreso, 13% DF, 3% IT sobre total
  (e.ingresos||[]).forEach((ing,i)=>{
    const tot=r2(pn(ing.monto));if(!tot)return;
    const ingNeto=r2(tot*0.87);
    const dfIva=r2(tot*0.13);
    const it=r2(tot*0.03);
    const diff=r2(tot-ingNeto-dfIva);
    const lines=[{c:'111001001',d:tot,h:0},{c:ing.cuenta||'411002004',d:0,h:ingNeto},{c:'214001001',d:0,h:dfIva},{c:'525002001',d:it,h:0},{c:'214004001',d:0,h:it}];
    if(Math.abs(diff)>0.001)lines.push(diff>0?{c:'561004001',d:0,h:diff}:{c:'441004001',d:-diff,h:0});
    E.push({id:'ING'+i,tipo:'I',desc:'INGRESO '+(MESES[(ing.mes||1)-1]||'').toUpperCase(),lines});
  });

  // ACTIVOS — UFV + DEPRECIACIÓN (desde Apertura + RCV con UFV por fecha)
  // Los activos de apertura usan UFVini/UFVfin del período completo
  // Los activos del RCV usan la UFV del día de compra y deprecian proporcionalmente
  const afItems=getAFFromApertura();
  afItems.forEach((af,i)=>{
    if(Math.abs(af.ajA)>0)
      E.push({id:'UA'+i,tipo:'T',desc:'UFV ACTIVO: '+af.nombre,
        lines:[{c:af.cA,d:af.ajA,h:0},{c:'441001001',d:0,h:af.ajA}]});
    if(Math.abs(af.ajD)>0)
      E.push({id:'UD'+i,tipo:'T',desc:'UFV DEP.ACUM: '+af.nombre,
        lines:[{c:'561001001',d:af.ajD,h:0},{c:af.cD,d:0,h:af.ajD}]});

  (e.activos||[]).forEach((af,i)=>{
    const tab=TAF[af.tipo];if(!tab)return;
    const vH=r2(pn(af.valorHistorico)),dAP=r2(pn(af.depAcumAnterior));
    const ajA=ui>0?r2(vH*(uR-1)):0;
    const ajD=ui>0?r2(dAP*(uR-1)):0;
    if(Math.abs(ajA)>0)E.push({id:'UAM'+i,tipo:'T',desc:'UFV ACTIVO (M): '+(af.nombre||af.tipo),lines:[{c:tab.cA,d:ajA,h:0},{c:'441001001',d:0,h:ajA}]});
    if(Math.abs(ajD)>0)E.push({id:'UDM'+i,tipo:'T',desc:'UFV DEP.ACUM (M): '+(af.nombre||af.tipo),lines:[{c:'561001001',d:ajD,h:0},{c:tab.cD,d:0,h:ajD}]});
    const dep=r2(r2(vH+ajA)*tab.tasa);
    if(dep>0)E.push({id:'DM'+i,tipo:'T',desc:'DEPRECIACIÓN (M): '+(af.nombre||af.tipo),lines:[{c:tab.cG,d:dep,h:0},{c:tab.cD,d:0,h:dep}]});
  });

  // UFV CAPITAL
  const capT=r2(pn(tr.capitalSocial)+pn(tr.ajusteCapital));
  const ajC=ui>0?r2(capT*(uR-1)):0;
  if(Math.abs(ajC)>0)E.push({id:'UFVC',tipo:'T',desc:'AJUSTE CAPITAL UFV',lines:[{c:'561001001',d:ajC,h:0},{c:'311002001',d:0,h:ajC}]});

  // IUE — basado en Gastos No Deducibles (hoja ER, E67-E72)
  const mT=buildM(E);
  const tI2=r2(Object.entries(mT).filter(([k])=>acctTipo(k)==='I').reduce((s,[,v])=>r2(s+v.saldo),0));
  const tG2=r2(Object.entries(mT).filter(([k])=>acctTipo(k)==='G').reduce((s,[,v])=>r2(s+v.saldo),0));
  const util2=r2(tI2-tG2); // E67: Resultado de la Gestión
  const gasNoDed2=r2(pn(e.cfg.gasNoDed||0)); // E68: Gastos No Deducibles
  const perdNComp2=r2(pn(e.cfg.perdNComp||0)); // E69: Saldo de Pérdida No Compensada
  const resTrib2=r2(util2+gasNoDed2-perdNComp2); // E70: Resultado Tributario
  const iue=resTrib2>0?r2(resTrib2*0.25):0; // E71: IUE = 25% del Resultado Tributario
  if(iue>0)E.push({id:'IUE',tipo:'T',desc:'PROVISIÓN IUE (25% de Resultado Tributario)',lines:[{c:'116006001',d:iue,h:0},{c:'214006001',d:0,h:iue}]});

  // COMPENSACIONES (CF UFV + DF vs CF + IT + Multas)
  const m2=buildM(E);
  const cfS2=r2(m2['116001001']?.saldo||0);
  const dfS2=r2(m2['214001001']?.saldo||0);
  const itS2=r2(m2['214004001']?.saldo||0);
  const multaS2=r2(m2['214026001']?.saldo||0);
  const iueC2=r2(m2['116006001']?.saldo||0);
  const ui2=pn(e.cfg.ufvInicio),uf2=pn(e.cfg.ufvFin);
  const uR2=ui2>0?r2(uf2/ui2):1;
  // 1. Ajuste CF con UFV
  const ajCF2=ui2>0?r2(cfS2*(uR2-1)):0;
  if(ajCF2>0)E.push({id:'AJCF',tipo:'T',desc:'AJUSTE CRÉDITO FISCAL CON UFV',lines:[{c:'116001001',d:ajCF2,h:0},{c:'441001001',d:0,h:ajCF2}]});
  const cfAct=r2(cfS2+ajCF2);
  // 2. Compensación DF vs CF
  const cmpDF=r2(Math.min(dfS2,cfAct));
  const dfRest=r2(dfS2-cmpDF);
  const iueParIT=r2(Math.min(iueC2,itS2));
  const itCaja=r2(itS2-iueParIT);
  const compLines=[];
  if(cmpDF>0){compLines.push({c:'214001001',d:cmpDF,h:0});compLines.push({c:'116001001',d:0,h:cmpDF});}
  if(dfRest>0){compLines.push({c:'214001001',d:dfRest,h:0});compLines.push({c:'111001001',d:0,h:dfRest});}
  if(itS2>0){compLines.push({c:'214004001',d:itS2,h:0});if(iueParIT>0)compLines.push({c:'116006001',d:0,h:iueParIT});if(itCaja>0)compLines.push({c:'111001001',d:0,h:itCaja});}
  if(multaS2>0){compLines.push({c:'214026001',d:multaS2,h:0});compLines.push({c:'111001001',d:0,h:multaS2});}
  if(compLines.length>0)E.push({id:'COMP',tipo:'T',desc:'COMPENSACIONES IVA / IT / MULTAS',lines:compLines});
  return E;
}

function calcAll(){
  const E=genEntries();const M=buildM(E);const gs=k=>r2(M[k]?.saldo||0);
  const tI=r2(Object.entries(M).filter(([k])=>acctTipo(k)==='I').reduce((s,[,v])=>r2(s+v.saldo),0));
  const tG=r2(Object.entries(M).filter(([k])=>acctTipo(k)==='G').reduce((s,[,v])=>r2(s+v.saldo),0));
  const util=r2(tI-tG);
  const aC=r2(['111001001','111002001','116001001','116006001'].reduce((s,c)=>r2(s+gs(c)),0));
  const aNC=r2(Object.keys(M).filter(k=>acctTipo(k)==='A'&&k.startsWith('12')).reduce((s,k)=>r2(s+gs(k)),0));
  const tA=r2(aC+aNC);
  const tP=r2(Object.keys(M).filter(k=>acctTipo(k)==='P').reduce((s,k)=>r2(s+gs(k)),0));
  const tPT=r2(Object.keys(M).filter(k=>acctTipo(k)==='PT').reduce((s,k)=>r2(s+gs(k)),0)+util);
  const difBG=r2(tA-tP-tPT);
  const dep=r2(Object.keys(M).filter(k=>k.startsWith('524')).reduce((s,k)=>r2(s+gs(k)),0));
  const e=emp();const ui=pn(e.cfg.ufvInicio),uf=pn(e.cfg.ufvFin);const uR=ui>0?r2(uf/ui):1;
  const capT=r2(pn(e.traspaso.capitalSocial)+pn(e.traspaso.ajusteCapital));
  const ajC=ui>0?r2(capT*(uR-1)):0;
  const gUFV=gs('561001001'),iUFV=gs('441001001');
  const vCF=r2(gs('116001001')-pn(e.traspaso.cfIva));
  const vIC=r2(gs('116006001')-pn(e.traspaso.iueComp));
  const vDF=r2(gs('214001001')-pn(e.traspaso.dfIva));
  const vIT=r2(gs('214004001')-pn(e.traspaso.itPagar));
  const vIUE=r2(gs('214006001')-pn(e.traspaso.iuePagar));
  const vPr=r2(gs('212003001')-pn(e.traspaso.prestamos));
  let inv=0;
  const TRAF={'VEHÍCULO':'vehiculo','MUEBLES Y ENSERES':'muebles','EQUIPOS DE COMPUTACIÓN':'equComp','EQUIPOS DE COMUNICACIONES':'equCom','EQUIPO DE OFICINA':'equOficina','EQUIPO ELECTRÓNICO':'equElec'};
  (e.activos||[]).forEach(af=>{
    const vH=r2(pn(af.valorHistorico));const ajA=ui>0?r2(vH*(uR-1)):0;
    const k2=TRAF[af.tipo];const sAnt=r2(pn(e.traspaso[k2]||0));
    const compra=r2(vH-sAnt-ajA);if(compra>0)inv=r2(inv-compra);
  });
  const fOp=r2(util+dep+gUFV-iUFV-vCF-vIC+vDF+vIT+vIUE);
  const fFin=r2(-vPr),difF=r2(fOp+inv+fFin);
  const sI=r2(pn(e.traspaso.caja)),sF=r2(sI+difF),cajaMN=gs('111001001');
  const ssA=Object.keys(M).filter(k=>M[k].debe>0||M[k].haber>0).sort();
  const ssTD=r2(ssA.reduce((s,k)=>r2(s+r2(M[k].debe)),0));
  const ssTH=r2(ssA.reduce((s,k)=>r2(s+r2(M[k].haber)),0));
  const ssTSD=r2(ssA.reduce((s,k)=>r2(s+r2(M[k].sD||0)),0));
  const ssTSH=r2(ssA.reduce((s,k)=>r2(s+r2(M[k].sH||0)),0));
  return{E,M,gs,util,tI,tG,aC,aNC,tA,tP,tPT,difBG,dep,gUFV,iUFV,vCF,vIC,vDF,vIT,vIUE,vPr,inv,fOp,fFin,difF,sI,sF,cajaMN,ajC,ssA,ssTD,ssTH,ssTSD,ssTSH,bgOK:difBG===0,ssOK:r2(ssTSD-ssTSH)===0,fOK:r2(sF-cajaMN)===0};
}

function renderRCV(){
  const rcvFromFile=emp().rcvData||[];

  const usingFile=rcvFromFile.length>0;
  const allRCV=usingFile?rcvFromFile:rcvFromPaste;
  const overrides=emp().rcvOverrides||{};

  const totCompras=r2(allRCV.reduce((s,r)=>r2(s+r.total),0));

  const rows=allRCV.slice(0,300).map((r,idx)=>{
    const lk=nitLookup(r.nit);

      '<td style="font-size:11px">'+(r.nro||'')+'</td>'+
      '<td style="max-width:130px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:11px">'+(r.razon||'')+'</td>'+
      '<td style="font-size:10px">'+(r.nit||'')+'</td>'+
      '<td style="font-size:10px">'+(r.fecha||'')+'</td>'+
      '<td class="r">'+fmt(r.total)+'</td>'+
      '<td class="r">'+fmt(r.cf)+'</td>'+
      '<td style="'+cellSt+'">'+
        (isOver?'<div style="font-size:9px;color:#F97316;font-weight:700;margin-bottom:1px">✏️ MANUAL</div>':'')+
        sdMake(sdId,finalCode,'rcSet',false,'G')+
        (isOver?'<button onclick="delete emp().rcvOverrides['+idx+'];saveLS();re()" style="font-size:9px;color:#F97316;background:none;border:none;cursor:pointer">↺ Restaurar</button>':'')+
      '</td>'+

  const uploadBtn='<label style="display:inline-flex;align-items:center;gap:8px;background:#031740;color:#fff;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">'+

      uploadBtn+
      (usingFile?'<button class="btn-del" style="font-size:11px;padding:4px 10px" onclick="emp().rcvData=[];emp().rcvOverrides={};saveLS();re()">🗑 Quitar archivo</button>':'')+

    '</div>'+
    (!usingFile?'<textarea placeholder="O pegar datos del RCV aquí (Tab-separado)..." onblur="emp().rcvTxt=this.value;saveLS();re()" style="height:90px;font-family:monospace;font-size:11px;background:#FFFDE7;border:1.5px solid #F9A825;border-radius:5px;padding:6px;width:100%;resize:vertical;margin-bottom:8px">'+(emp().rcvTxt||'')+'</textarea>':'')+
    (allRCV.length>0?

        (usingFile?'📁 Archivo: ':'📋 Pegado: ')+
        '<strong>'+allRCV.length+'</strong> registros | CF: <strong>'+fmt(totCF)+'</strong> Bs | Total: <strong>'+fmt(totCompras)+'</strong> Bs'+
        (Object.keys(overrides).length?' <span style="color:#F97316">| ✏️ '+Object.keys(overrides).length+' editadas</span>':'')+
      '</div>':

    '')+
    (allRCV.length?

      '<table><thead><tr><th>Nº</th><th>Razón Social</th><th>NIT</th><th>Fecha</th><th class="r">Total</th><th class="r">CF</th>'+

function renderActivos(){
  const ui=pn(emp().cfg.ufvInicio),uf=pn(emp().cfg.ufvFin);const uR=ui>0?r2(uf/ui):1;
  const tipos=Object.keys(TAF);
  const rows=(emp().activos||[]).map((af,i)=>{
    const tab=TAF[af.tipo];const vH=r2(pn(af.valorHistorico)),dAP=r2(pn(af.depAcumAnterior));
    const ajA=tab&&ui>0?r2(vH*(uR-1)):0,ajD=tab&&ui>0?r2(dAP*(uR-1)):0;
    const dep=tab?r2(r2(vH+ajA)*tab.tasa):0;
    const vhDisp=vH?vH.toString().replace('.',','):'';const dapDisp=dAP?dAP.toString().replace('.',','):'';
    return '<div style="padding:12px;background:#F8FAFC;border-radius:8px;border:1px solid #E2E8F0;margin-bottom:8px">'+
      '<div class="g4">'+
      '<div><label>Tipo</label><select onchange="emp().activos['+i+'].tipo=this.value;saveLS();reLazy()"><option value="">Seleccionar...</option>'+tipos.map(k=>'<option value="'+k+'"'+(af.tipo===k?' selected':'')+'>'+k+'</option>').join('')+'</select></div>'+
      '<div><label>Descripción</label><input type="text" value="'+(af.nombre||'')+'" onblur="emp().activos['+i+'].nombre=this.value;saveLS()"/></div>'+
      '<div><label>Valor Histórico (Bs)</label><input type="text" class="n" value="'+vhDisp+'" oninput="" onblur="emp().activos['+i+'].valorHistorico=pn(this.value);saveLS();reLazy()"/></div>'+
      '<div><label>Dep.Acum. Anterior (Bs)</label><input type="text" class="n" value="'+dapDisp+'" oninput="" onblur="emp().activos['+i+'].depAcumAnterior=pn(this.value);saveLS();reLazy()"/></div>'+
      '</div>'+
      (tab&&vH>0?'<div style="font-size:10px;color:#555;margin-top:6px;display:flex;gap:12px;flex-wrap:wrap;background:#F0FDF4;padding:5px 8px;border-radius:5px"><span>UFV Activo: <strong>'+fmt(ajA)+'</strong></span><span>Valor actualiz.: <strong>'+fmt(r2(vH+ajA))+'</strong></span><span style="color:#DC2626">Dep. año ('+Math.round(tab.tasa*100)+'%): <strong>'+fmt(dep)+'</strong></span><span>UFV Dep.Acum: <strong>'+fmt(ajD)+'</strong></span><span>Dep.Acum total: <strong>'+fmt(r2(dAP+ajD+dep))+'</strong></span></div>':'')+
      '<div style="text-align:right;margin-top:6px"><button class="btn-del" onclick="emp().activos.splice('+i+',1);saveLS();re()">✕ Eliminar</button></div>'+
      '</div>';
  }).join('');
  return '<div class="card"><div class="h2">🏗️ Activos Fijos</div>'+
    '<p class="nota">Dep. = ROUND(Valor actualizado × Tasa, 2). UFV aplicada antes de calcular depreciación.</p>'+
    rows+'<button class="btn-blue" onclick="emp().activos.push({tipo:\'\',nombre:\'\',valorHistorico:\'\',depAcumAnterior:\'\'});saveLS();re()">+ Agregar Activo Fijo</button></div>';
}

function pasteNITs(txt){
  if(!txt.trim()){alert('Pega datos primero');return;}
  const rows=txt.trim().split('\n');
  let added=0,skipped=0;
  rows.forEach(row=>{
    const cols=row.split('\t');
    if(cols.length<2){skipped++;return;}
    const nit=(cols[0]||'').trim();
    const razon=(cols[1]||'').trim();
    const cat=(cols[2]||'').trim();
    const cuenta=(cols[3]||'').trim();
    if(!nit){skipped++;return;}
    // Check if NIT already exists
    const exists=S.nits.findIndex(n=>String(n.nit)===String(nit));
    if(exists>=0){
      // Update existing
      S.nits[exists]={nit,razon,cat,cuenta};
    } else {
      S.nits.push({nit,razon,cat,cuenta});
      added++;
    }
  });
  saveLS();re();
  alert('✓ '+added+' NITs nuevos importados. '+(rows.length-added-skipped)+' actualizados. '+skipped+' omitidos.');
}

function getHier(code){
  const h=ACCT_HIER[code];
  if(h) return h;
  // Fallback: derive from code digits
  const s=String(code);
  if(s.length===9){
    return{C:parseInt(s[0]),G:parseInt(s[1]),SG:parseInt(s[2]),CP:s.slice(3,6),CA:s.slice(6,9)};
  }
  return{C:s[0]||'',G:'',SG:'',CP:'',CA:''};
}

function checkAccess(){
  // Check if current user is active
  const cu=getCurrentUser&&getCurrentUser();
  if(cu){
    const users=getUsers();
    const found=users.find(function(u){return u.username===cu.username;});
    if(found&&found.active===false){
      // Show blocked screen
      document.getElementById('root').innerHTML='<div style="position:fixed;inset:0;background:#031740;display:flex;align-items:center;justify-content:center;z-index:2000">'+
        '<div style="text-align:center;color:#fff"><div style="font-size:60px">🚫</div>'+

        '<div style="color:rgba(255,255,255,.6);font-size:13px">Tu acceso ha sido desactivado por el administrador.<br>Contacta a CONTAX para obtener ayuda.</div>'+
        '<button onclick="logout()" style="margin-top:20px;background:#EF4444;color:#fff;border:none;border-radius:8px;padding:10px 24px;cursor:pointer;font-size:13px">Cerrar Sesión</button>'+
        '</div></div>';
      return null; // special null means "blocked, don't proceed"
    }
    if(found) return true; // active user, skip code check
  }
  // Check access code
  const overrideCode=localStorage.getItem('cx_override_code');
  const effectiveCode=overrideCode||ACCESS_CODE;
  const stored = localStorage.getItem('cx_access');
  if(!stored) return false;
  try { const d = JSON.parse(stored); return d.code === effectiveCode || d.code === ADMIN_CODE; }
  catch { return false; }
}

  const stored = localStorage.getItem('cx_access');
  try { return JSON.parse(stored||'{}').code === ADMIN_CODE; } catch { return false; }
}
function grantAccess(code){
  if(code !== ACCESS_CODE && code !== ADMIN_CODE) return false;
  localStorage.setItem('cx_access', JSON.stringify({code, ts: new Date().toISOString()}));
  // Log active user
  const user = getUser ? getUser() : 'desconocido';
  const activos = JSON.parse(localStorage.getItem('cx_activos')||'[]');
  activos.unshift({user, ts: new Date().toISOString(), code: code===ADMIN_CODE?'ADMIN':'USER'});
  if(activos.length > 50) activos.length = 50;
  localStorage.setItem('cx_activos', JSON.stringify(activos));
  return true;
}

function calcAutoOA(){
  const tr=emp().traspaso;
  const ui=pn(emp().cfg.ufvInicio),uf=pn(emp().cfg.ufvFin);
  const uR=ui>0?r2(uf/ui):1;
  // AJUSTE DE CAPITAL
  const capSoc=r2(pn(tr.capitalSocial));
  const ajCap2=r2(pn(tr.ajusteCapital));
  const ajCapSoc=ui>0?r2(capSoc*(uR-1)):0;
  const ajCapAj=ui>0?r2(ajCap2*(uR-1)):0;
  const totalAjCap=r2(ajCapSoc+ajCapAj);
  // PER ASSET
  const assetCalcs=[];
  (emp().activos||[]).forEach(af=>{
    const tab=TAF[af.tipo];if(!tab)return;
    const vH=r2(pn(af.valorHistorico));
    const dAP=r2(pn(af.depAcumAnterior));
    const ajA=ui>0?r2(vH*(uR-1)):0;
    const vAct=r2(vH+ajA);
    const dep=r2(vAct*tab.tasa);
    const ajD=ui>0?r2(dAP*(uR-1)):0;
    assetCalcs.push({af,tab,ajA,dep,ajD});
  });
  return{totalAjCap,ajCapSoc,ajCapAj,assetCalcs,uR,ui,uf};
}

function buildAFSection(){
  const afItems=getAFFromApertura();
  if(!afItems.length)return '';
  const ufvTotal=r2(afItems.reduce(function(s,a){return r2(s+a.ajA);},0));
  const depTotal=r2(afItems.reduce(function(s,a){return r2(s+a.dep);},0));
  const ufvDTotal=r2(afItems.reduce(function(s,a){return r2(s+a.ajD);},0));
  const parts=['<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:700;color:#031740;margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid #BFDBFE">🤖 ASIENTOS AUTOMÁTICOS — ACTIVOS FIJOS</div>'];
  if(ufvTotal>0){
    const ufvLines=[];
    afItems.filter(function(a){return a.ajA>0;}).forEach(function(a){ufvLines.push({c:a.cA,d:a.ajA,h:0});});
    if(ufvLines.length){ufvLines.push({c:'441001001',d:0,h:ufvTotal});}
    parts.push(roAsientoAF('Actualización Activos Fijos con UFV',ufvLines));
  }
  if(depTotal>0){
    const depLines=[];
    afItems.filter(function(a){return a.dep>0;}).forEach(function(a){
      depLines.push({c:a.cG,d:a.dep,h:0});depLines.push({c:a.cD,d:0,h:a.dep});
    });
    parts.push(roAsientoAF('Depreciación Activos Fijos',depLines));
  }
  if(ufvDTotal>0){
    const ufvDLines=[];
    afItems.filter(function(a){return a.ajD>0;}).forEach(function(a){
      ufvDLines.push({c:'561001001',d:a.ajD,h:0});ufvDLines.push({c:a.cD,d:0,h:a.ajD});
    });
    parts.push(roAsientoAF('Actualización Depreciación Acumulada con UFV',ufvDLines));
  }
  parts.push('<div class="nota">Estos asientos se incluyen automáticamente en Comprobantes y Mayores.</div></div>');
  return parts.join('');
}


function calcTraspasoResultados(){
  const tr=emp().traspaso;
  const resAcum=r2(pn(tr.resAcum||0));
  if(resAcum>0)return{tipo:'utilidad',monto:resAcum};
  if(resAcum<0)return{tipo:'perdida',monto:Math.abs(resAcum)};
  return null;
}

function renderCuadroAF(){
  const ui=pn(emp().cfg.ufvInicio),uf=pn(emp().cfg.ufvFin);const uR=ui>0?r2(uf/ui):1;
  const cfg=emp().cfg;
  // Get items from Apertura + RCV (auto) and from Activos tab (manual)
  const autoItems=getAFFromApertura();
  const manualItems=(emp().activos||[]).map(af=>{
    const TAF2={'VEHÍCULO':{tasa:.20,cA:'123003001',cD:'124001001',cG:'524001005'},'MUEBLES Y ENSERES':{tasa:.10,cA:'123004001',cD:'124001002',cG:'524001004'},'EQUIPOS DE COMPUTACIÓN':{tasa:.25,cA:'123006001',cD:'124001003',cG:'524001002'},'EQUIPOS DE COMUNICACIONES':{tasa:.20,cA:'123007001',cD:'124001004',cG:'524001001'},'EQUIPO DE OFICINA':{tasa:.10,cA:'123009001',cD:'124001005',cG:'524001006'},'EQUIPO ELECTRÓNICO':{tasa:.25,cA:'123010001',cD:'124001006',cG:'524001003'}};
    const tab=TAF2[af.tipo];if(!tab)return null;
    const vH=r2(pn(af.valorHistorico)),dAP=r2(pn(af.depAcumAnterior));
    const ajA=ui>0?r2(vH*(uR-1)):0,vAct=r2(vH+ajA),dep=r2(vAct*tab.tasa),ajD=ui>0?r2(dAP*(uR-1)):0;
    return{tipo:af.tipo,nombre:af.nombre||af.tipo,fuente:'Manual',vH,dAP,ajA,vAct,dep,ajD,dTotal:r2(dAP+ajD+dep),vNeto:r2(vAct-r2(dAP+ajD+dep)),tasa:tab.tasa,cA:tab.cA,cD:tab.cD,cG:tab.cG};
  }).filter(Boolean);

  // Merge: auto items first, then manual only if no duplicate type
  const autoTypes=new Set(autoItems.map(a=>a.cA));
  const allItems=[...autoItems,...manualItems.filter(m=>!autoTypes.has(m.cA))];

  const rows=allItems.map(af=>'<tr>'+
    '<td>'+af.nombre+'</td>'+
    '<td style="font-size:10px;color:#77888C">'+af.fuente+'</td>'+
    '<td class="r">'+fmt(af.vH)+'</td>'+

function renderGraficos(c){
  const{util,tI,tG,gs,M,tA,tP,tPT}=c;
  const cfg=emp().cfg;
  const PAL=['#031740','#142740','#77888C','#A8B8C0','#4A6274','#1E3A5F'];

  function miniBar(vals,color,title,labels){
    const max=Math.max(...vals)||1;const W=500,H=80;
    const bw=Math.max(8,Math.floor((W-20)/vals.length)-2);
    const bars=vals.map(function(v,i){
      const bh=Math.round(v/max*H);const x=10+i*(bw+2);
      return '<rect x="'+x+'" y="'+(H-bh)+'" width="'+bw+'" height="'+bh+'" fill="'+color+'" rx="2" opacity=".85"><title>'+(labels?labels[i]:i+1)+': '+fmt(v)+'</title></rect>'+
        (bh>0?'<text x="'+(x+bw/2)+'" y="'+(H-bh-3)+'" text-anchor="middle" font-size="8" fill="'+color+'">'+fmt(v)+'</text>':'')+
        '<text x="'+(x+bw/2)+'" y="'+(H+12)+'" text-anchor="middle" font-size="7.5" fill="#888">'+(labels?labels[i].substring(0,4):i+1)+'</text>';
    }).join('');
    return '<div style="margin-bottom:10px">'+
      '<div style="font-size:11px;font-weight:700;color:#031740;margin-bottom:6px">'+title+'</div>'+
      '<svg viewBox="0 0 '+(W+10)+' '+(H+18)+'" width="100%">'+bars+'</svg></div>';
  }

  function donut(items,title){
    const tot=items.reduce(function(s,x){return s+x.v;},0);if(!tot)return '';
    let st=0;const R=55,r=28,cx=70,cy=70;
    const slices=items.map(function(item,i){
      const a=item.v/tot*360;const s1=st*Math.PI/180;const e1=(st+a)*Math.PI/180;
      const x1=cx+R*Math.sin(s1);const y1=cy-R*Math.cos(s1);
      const x2=cx+R*Math.sin(e1);const y2=cy-R*Math.cos(e1);
      const x3=cx+r*Math.sin(e1);const y3=cy-r*Math.cos(e1);
      const x4=cx+r*Math.sin(s1);const y4=cy-r*Math.cos(s1);
      const lg=a>180?1:0;st+=a;
      return '<path d="M'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+R+','+R+',0,'+lg+',1,'+x2.toFixed(1)+','+y2.toFixed(1)+
        ' L'+x3.toFixed(1)+','+y3.toFixed(1)+' A'+r+','+r+',0,'+lg+',0,'+x4.toFixed(1)+','+y4.toFixed(1)+' Z"'+
        ' fill="'+PAL[i%PAL.length]+'" stroke="#fff" stroke-width="2"><title>'+item.n+': '+fmt(item.v)+'</title></path>';
    }).join('');
    const legend=items.map(function(item,i){
      return '<div style="display:flex;align-items:center;gap:5px;font-size:11px;margin-bottom:3px">'+
        '<div style="width:10px;height:10px;background:'+PAL[i%PAL.length]+';border-radius:2px;flex-shrink:0"></div>'+
        '<span>'+item.n.substring(0,20)+'</span><span style="margin-left:auto;font-weight:700">'+fmt(item.v)+'</span></div>';
    }).join('');
    return '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'+
      '<div><div style="font-size:11px;font-weight:700;color:#031740;margin-bottom:6px">'+title+'</div>'+
        '<svg viewBox="0 0 140 140" width="130" height="130">'+slices+
        '<text x="70" y="66" text-anchor="middle" font-size="10" fill="#888">TOTAL</text>'+
        '<text x="70" y="79" text-anchor="middle" font-size="11" font-weight="700" fill="#031740">'+fmt(tot)+'</text>'+
        '</svg></div>'+
      '<div style="flex:1;min-width:120px">'+legend+'</div>'+
    '</div>';
  }

  function kpi(val,label,icon){
    return '<div style="background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:12px;text-align:center">'+
      '<div style="font-size:18px;margin-bottom:4px">'+icon+'</div>'+
      '<div style="font-size:16px;font-weight:700;color:#031740">'+val+'</div>'+
      '<div style="font-size:10px;color:#77888C;margin-top:2px">'+label+'</div></div>';
  }

  const inc=Object.keys(M).filter(function(k){return acctTipo(k)==='I'&&gs(k)>0;}).map(function(k){return{n:acctName(k).substring(0,20),v:gs(k)};});
  const gto=Object.keys(M).filter(function(k){return acctTipo(k)==='G'&&gs(k)>0;}).sort(function(a,b){return gs(b)-gs(a);}).slice(0,8).map(function(k){return{n:acctName(k).substring(0,20),v:gs(k)};});
  const margen=tI>0?r2(util/tI*100):0;
  const MESES_G=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const tribData=buildTribResumen();

  return '<div class="card"><div class="h2">📊 Gráficos — '+cfg.razonSocial+'</div>'+
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">'+
      kpi(fmt(tI)+' Bs','Total Ingresos','💰')+
      kpi(fmt(tG)+' Bs','Total Gastos','📤')+
      kpi(fmt(util)+' Bs',(util>=0?'Utilidad':'Pérdida'),(util>=0?'📈':'📉'))+
      kpi(margen+'%','Margen de Utilidad','🎯')+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">'+
      '<div class="card" style="box-shadow:none;border:1px solid #E2E8F0">'+donut([{n:'Ingresos',v:tI},{n:'Gastos',v:tG}],'Ingresos vs Gastos')+'</div>'+
      '<div class="card" style="box-shadow:none;border:1px solid #E2E8F0">'+donut([{n:'Activo',v:tA},{n:'Pasivo',v:tP},{n:'Patrimonio',v:tPT}],'Estructura del Balance')+'</div>'+
    '</div>'+
    (gto.length?'<div class="card" style="box-shadow:none;border:1px solid #E2E8F0;margin-bottom:12px">'+miniBar(gto.map(function(x){return x.v;}),PAL[0],'Top Gastos del Período (Bs)',gto.map(function(x){return x.n.substring(0,12);}))+'</div>':'')+
    (inc.length>1?'<div class="card" style="box-shadow:none;border:1px solid #E2E8F0;margin-bottom:12px">'+donut(inc,'Desglose de Ingresos')+'</div>':'')+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+
      '<div class="card" style="box-shadow:none;border:1px solid #E2E8F0">'+
        miniBar(tribData.map(function(m){return m.ivaAPagar;}),PAL[0],'IVA a Pagar por Mes (Bs)',MESES_G)+
        miniBar(tribData.map(function(m){return m.itAPagar;}),PAL[2],'IT a Pagar por Mes (Bs)',MESES_G)+
      '</div>'+
      '<div class="card" style="box-shadow:none;border:1px solid #E2E8F0">'+
        miniBar(tribData.map(function(m){return m.compras;}),PAL[1],'Total Compras por Mes (Bs)',MESES_G)+
        miniBar(tribData.map(function(m){return m.ventas;}),PAL[3],'Total Ventas por Mes (Bs)',MESES_G)+
      '</div>'+
    '</div>'+
  '</div>';
}

function calcProg(item){
  let p=0;
  if(item.razon)p++;if(item.nit)p++;if(item.gestion)p++;
  if(item.rcvOk)p++;if(item.ingOk)p++;if(item.afOk)p++;
  if(item.bgOk)p++;if(item.ssOk)p++;if(item.flujoOk)p++;
  if(item.estado==='terminado')p++;
  return Math.round(p/10*100);
}

function autoFillUFV(){
  const cfg=emp().cfg;
  const fi=cfg.fechaInicio,ff=cfg.fechaFin;
  if(!fi||!ff||S.ufvData.length===0)return;
  // Search exact match
  const ufvI=S.ufvData.find(u=>u.fecha===fi||u.fecha===isoToLocal(fi));
  const ufvF=S.ufvData.find(u=>u.fecha===ff||u.fecha===isoToLocal(ff));
  if(ufvI){emp().cfg.ufvInicio=ufvI.ufv;console.log('UFV inicio auto:',ufvI.ufv);}
  if(ufvF){emp().cfg.ufvFin=ufvF.ufv;console.log('UFV fin auto:',ufvF.ufv);}
  saveLS();
}
function isoToLocal(iso){
  // Convert 2025-01-01 to 01/01/2025 for lookup
  if(!iso)return iso;
  const p=iso.split('-');
  if(p.length===3)return p[2]+'/'+p[1]+'/'+p[0];
  return iso;
}

function parseMesFromFecha(fecha){
  if(!fecha)return null;
  let s=String(fecha).trim();
  // ISO: 2025-02-05
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return parseInt(s.split('-')[1]);
  // DD/MM/YYYY
  if(/^\d{1,2}\/\d{1,2}\/\d{4}/.test(s))return parseInt(s.split('/')[1]);
  // DD/MM/YY
  if(/^\d{1,2}\/\d{1,2}\/\d{2}/.test(s))return parseInt(s.split('/')[1]);
  return null;
}

function buildTribResumen(){
  // Build monthly data from RCV + Ventas + manual ingresos
  const e=emp();
  const allRCV=(e.rcvData&&e.rcvData.length>0)?e.rcvData:parseRCV(e.rcvTxt||'').filter(r=>r.estado==='CONSOLIDADO');
  const allVentas=e.ventasData||[];
  const months=Array.from({length:12},(_,i)=>({mes:i+1,compras:0,ventas:0,cfIVA:0,dfIVA:0,ivaAPagar:0,cfDisponible:0,itAPagar:0}));

  // RCV → Total Compras por mes
  allRCV.forEach(r=>{
    const m=parseMesFromFecha(r.fecha);
    if(m>=1&&m<=12){
      const totalN=r2(r.total-(r.ice||0)-(r.iehd||0)-(r.ipj||0)-(r.tasas||0));
      months[m-1].compras=r2(months[m-1].compras+totalN);
      // CF: 13% de compras (o 70%*13% si combustible)
      let cf;
      if(r.noSujeto>0){const b70=r2(totalN*0.70);cf=r.derechoCF==='SI'?r2(b70*0.13):0;}
      else{cf=r.derechoCF==='SI'?r2(totalN*0.13):0;}
      months[m-1].cfIVA=r2(months[m-1].cfIVA+cf);
    }
  });

  // Ventas → Total Ventas + DF IVA + IT por mes
  allVentas.forEach(v=>{
    const m=parseMesFromFecha(v.fecha);
    if(m>=1&&m<=12){
      const tot=r2(v.total);
      months[m-1].ventas=r2(months[m-1].ventas+tot);
      months[m-1].dfIVA=r2(months[m-1].dfIVA+r2(tot*0.13));
      months[m-1].itAPagar=r2(months[m-1].itAPagar+r2(tot*0.03));
    }
  });
  // Manual ingresos → also add by month
  (e.ingresos||[]).forEach(ing=>{
    const m=+(ing.mes||1);const tot=r2(pn(ing.monto));if(!tot)return;
    if(m>=1&&m<=12){
      months[m-1].ventas=r2(months[m-1].ventas+tot);
      months[m-1].dfIVA=r2(months[m-1].dfIVA+r2(tot*0.13));
      months[m-1].itAPagar=r2(months[m-1].itAPagar+r2(tot*0.03));
    }
  });

  // Calculate IVA neto por mes
  months.forEach(m=>{
    const neto=r2(m.dfIVA-m.cfIVA);
    m.ivaAPagar=neto>0?neto:0;
    m.cfDisponible=neto<0?Math.abs(neto):0;
  });
  return months;
}

// ─── Helpers para AFV con fecha ──────────────────────────────
function getUFVForDate(fecha){
  if(!fecha||!S.ufvData||S.ufvData.length===0)return null;
  let iso=String(fecha).trim();
  // DD/MM/YYYY → YYYY-MM-DD
  if(/^\d{1,2}\/\d{1,2}\/\d{4}/.test(iso)){
    const p=iso.split('/');iso=p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');
  }
  // Serial date (Excel) → skip
  if(/^\d+$/.test(iso))return null;
  const found=S.ufvData.find(u=>u.fecha===iso);
  return found?parseFloat(found.ufv):null;
}

function getMesesDesde(fechaCompra, fechaFin){
  // Meses desde fecha de compra hasta fin del período (inclusive)
  if(!fechaCompra)return 12;
  let sC=String(fechaCompra).trim(),sF=String(fechaFin||'').trim();
  let mC,yC,mF,yF;
  if(/^\d{1,2}\/\d{1,2}\/\d{4}/.test(sC)){const p=sC.split('/');mC=parseInt(p[1]);yC=parseInt(p[2]);}
  else if(/^\d{4}-\d{2}-\d{2}/.test(sC)){const p=sC.split('-');yC=parseInt(p[0]);mC=parseInt(p[1]);}
  else return 12;
  if(/^\d{4}-\d{2}-\d{2}/.test(sF)){const p=sF.split('-');yF=parseInt(p[0]);mF=parseInt(p[1]);}
  else{yF=new Date().getFullYear();mF=12;}
  const meses=(yF-yC)*12+(mF-mC)+1;
  return Math.max(1,Math.min(12,meses));
}

function getAFFromApertura(){
  const tr=emp().traspaso;
  const ui=pn(emp().cfg.ufvInicio),uf=pn(emp().cfg.ufvFin);
  const uR=ui>0?r2(uf/ui):1;
  const defs=[
    {tipo:'VEHÍCULO',     cA:'123003001',cD:'124001001',cG:'524001005',tasa:.20,k:'vehiculo',   kD:'depVehiculo'},
    {tipo:'MUEBLES Y ENSERES',  cA:'123004001',cD:'124001002',cG:'524001004',tasa:.10,k:'muebles',    kD:'depMuebles'},
    {tipo:'EQUIPOS DE COMPUTACIÓN',cA:'123006001',cD:'124001003',cG:'524001002',tasa:.25,k:'equComp',kD:'depEquComp'},
    {tipo:'EQUIPOS DE COMUNICACIONES',cA:'123007001',cD:'124001004',cG:'524001001',tasa:.20,k:'equCom',kD:'depEquCom'},
    {tipo:'EQUIPO DE OFICINA',  cA:'123009001',cD:'124001005',cG:'524001006',tasa:.10,k:'equOficina',kD:'depEquOficina'},
    {tipo:'EQUIPO ELECTRÓNICO', cA:'123010001',cD:'124001006',cG:'524001003',tasa:.25,k:'equElec',  kD:'depEquElec'},
  ];
  const items=[];
  defs.forEach(d=>{
    const vH=r2(pn(tr[d.k]||0));
    if(!vH)return;
    const dAP=r2(pn(tr[d.kD]||0));
    const ajA=ui>0?r2(vH*(uR-1)):0;
    const vAct=r2(vH+ajA);
    const dep=r2(vAct*d.tasa);
    const ajD=ui>0?r2(dAP*(uR-1)):0;
    items.push({tipo:d.tipo,nombre:d.tipo,fuente:'Apertura',vH,dAP,ajA,vAct,dep,ajD,dTotal:r2(dAP+ajD+dep),vNeto:r2(vAct-r2(dAP+ajD+dep)),tasa:d.tasa,cA:d.cA,cD:d.cD,cG:d.cG});
  });
  // Activos Fijos del RCV — UFV y depreciación desde fecha de compra
  const allRCV=(emp().rcvData&&emp().rcvData.length>0)?emp().rcvData:[];
  const AFcodes={'123003001':'VEHÍCULO','123004001':'MUEBLES Y ENSERES','123006001':'EQUIPOS DE COMPUTACIÓN','123007001':'EQUIPOS DE COMUNICACIONES','123009001':'EQUIPO DE OFICINA','123010001':'EQUIPO ELECTRÓNICO'};
  const cfg=emp().cfg;
  allRCV.forEach((r,i)=>{
    const overrides=emp().rcvOverrides||{};
    const lk=nitLookup(r.nit);
    const autoCode=lk?lk.cuenta:(CAT_MAP[r.cat?.trim()]||'526002001');
    const code=overrides[i]||autoCode;
    if(!AFcodes[code])return;
    const def=defs.find(d=>d.cA===code);if(!def)return;
    const vH=r2(r.total-r.ice-r.iehd-r.ipj-r.tasas);
    if(!vH)return;
    // UFV específica del día de compra
    const ufvCompra=getUFVForDate(r.fecha)||uf; // fallback: UFV fin período
    const uRcv=uf>0&&ufvCompra>0?r2(uf/ufvCompra):1;
    const ajA=ufvCompra>0&&uRcv!==1?r2(vH*(uRcv-1)):0;
    const vAct=r2(vH+ajA);
    // Depreciación proporcional desde mes de compra hasta fin del período
    const meses=getMesesDesde(r.fecha,cfg.fechaFin);
    const dep=r2(vAct*def.tasa*(meses/12));
    const label=AFcodes[code]+' — '+(r.fecha||'')+(r.razon?' ('+r.razon.substring(0,20)+')':'');
    items.push({
      tipo:AFcodes[code],nombre:label,fuente:'RCV',
      fecha:r.fecha,ufvCompra,meses,
      vH,dAP:0,ajA,vAct,dep,ajD:0,
      dTotal:dep,vNeto:r2(vAct-dep),
      tasa:def.tasa,cA:def.cA,cD:def.cD,cG:def.cG
    });
  });
  return items;
}


// ═══ COMPENSACIONES ═══════════════════════════════════
function calcCompensaciones(c){
  const{gs,M}=c;
  const ui=pn(emp().cfg.ufvInicio),uf=pn(emp().cfg.ufvFin);
  const uR=ui>0?r2(uf/ui):1;

  // Current balances FROM MAYORES (antes de compensar)
  const cfSaldo  = r2(gs('116001001')); // Crédito Fiscal IVA (activo)
  const dfSaldo  = r2(gs('214001001')); // Débito Fiscal IVA (pasivo)
  const itSaldo  = r2(gs('214004001')); // IT Por Pagar
  const iuePagar = r2(gs('214006001')); // IUE Por Pagar
  const iueComp  = r2(gs('116006001')); // IUE A Compensar
  const multas   = r2(gs('214026001')); // Multas e Intereses

  // PASO 1: Ajuste CF con UFV (si hay UFVs configurados)
  const ajCF = ui>0 ? r2(cfSaldo*(uR-1)) : 0;
  const cfActualizado = r2(cfSaldo + ajCF);

  // PASO 2: Compensación DF vs CF
  const compCFDF = r2(Math.min(dfSaldo, cfActualizado));
  const dfRestante = r2(dfSaldo - compCFDF);
  const cfRestante = r2(cfActualizado - compCFDF);

  // PASO 3: Pago IT con caja/banco
  // Se puede usar IUE A Compensar para pagar IT
  const iueParaIT = r2(Math.min(iueComp, itSaldo));
  const itConCaja = r2(itSaldo - iueParaIT);

  // PASO 4: DF restante se paga con caja
  const dfConCaja = dfRestante;

  // PASO 5: Multas se pagan con caja
  const multasConCaja = multas;

  // Total a pagar con caja
  const totalCaja = r2(dfConCaja + itConCaja + multasConCaja);

  return{cfSaldo,dfSaldo,itSaldo,iuePagar,iueComp,multas,
         ajCF,cfActualizado,compCFDF,dfRestante,cfRestante,
         iueParaIT,itConCaja,dfConCaja,multasConCaja,totalCaja};
}

function getCompData(){
  const saved=localStorage.getItem('cx_comp_'+S.activeId);
  if(saved)try{return JSON.parse(saved);}catch{}
  return Array.from({length:12},(_,i)=>({mes:i+1,
    compDF:'',compCF:'',compIT:'',compIUE:'',compMultas:'',compCaja:'',
    ajCF:'',ajUFV:'',comentario:''
  }));
}
function saveCompData(d){localStorage.setItem('cx_comp_'+S.activeId,JSON.stringify(d));}
function setComp(mes,campo,val){
  const d=getCompData();d[mes-1][campo]=val;saveCompData(d);reLazy(200);
}

function renderCompensaciones(c){
  const data=getCompData();
  const tribData=buildTribResumen(); // Auto-calculated monthly data
  const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const cfg=emp().cfg;

  // Auto-suggest button: shows calculated value from system, click to apply
  function autoBtn(mes,campo,calcVal){
    if(!calcVal||calcVal<=0) return '';
    return '<button onclick="setComp('+mes+',\''+campo+'\','+calcVal+');re()" '+
      'title="Sugerir del sistema: '+fmt(calcVal)+' Bs" '+
      'style="background:#EEF2FF;border:1px solid #142740;border-radius:4px;padding:2px 6px;font-size:9px;cursor:pointer;color:#142740;white-space:nowrap;flex-shrink:0">'+
      '→ '+fmt(calcVal)+'</button>';
  }

  // Input field with optional auto-suggest
  function compInp(mes,campo,val,hasAuto,calcVal,style){
    const disp=val?String(val).replace('.',','):'';
    const inp='<input type="text" value="'+disp+'" oninput="" '+
      'onblur="setComp('+mes+',\''+campo+'\',pn(this.value));re()" '+
      'style="width:85px;background:#FFFDE7;border:1.5px solid #F9A825;border-radius:4px;padding:4px 6px;font-size:12px;text-align:right;'+(style||'')+'"/>'+
      (hasAuto?autoBtn(mes,campo,calcVal):'');
    return inp;
  }

  function asientoRow(cuenta,nombre,inp_d,inp_h){
    return '<div style="display:grid;grid-template-columns:110px 1fr auto auto;gap:6px;align-items:center;margin-bottom:5px;padding:4px 6px;border-radius:4px;background:#FAFAFA">'+
      '<span style="font-family:monospace;font-size:10px;color:#77888C">'+cuenta+'</span>'+
      '<span style="font-size:11px;color:#0D0D0D">'+nombre+'</span>'+
      '<div style="display:flex;align-items:center;gap:4px">'+(inp_d||'<span style="width:85px;display:inline-block"></span>')+'</div>'+
      '<div style="display:flex;align-items:center;gap:4px">'+(inp_h||'<span style="width:85px;display:inline-block"></span>')+'</div>'+
    '</div>';
  }

  function asientoBlock(titulo,color,rows,totD,totH){
    const ok=r2(totD-totH)===0&&totD>0;
    return '<div style="background:#fff;border:1px solid #E2E8F0;border-radius:8px;padding:10px;margin-bottom:8px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
        '<span style="font-size:11px;font-weight:700;color:'+color+'">'+titulo+'</span>'+
        (totD>0?'<span class="'+(ok?'badge-ok':'badge-err')+'">'+(ok?'✓ CUADRADO':'✗ Dif: '+fmt(r2(totD-totH)))+'</span>':'<span style="font-size:10px;color:#aaa">Sin datos</span>')+
      '</div>'+
      '<div style="display:grid;grid-template-columns:110px 1fr auto auto;gap:6px;font-size:9px;font-weight:700;color:#888;padding:2px 6px;margin-bottom:3px">'+
        '<span>CUENTA</span><span>NOMBRE</span><span style="text-align:right">DEBE</span><span style="text-align:right">HABER</span>'+
      '</div>'+
      rows.join('')+
      (totD>0?'<div style="font-size:10px;padding:4px 8px;background:#F2F2F2;border-radius:4px;margin-top:4px;display:flex;gap:10px">'+
        '<span>DEBE: <strong>'+fmt(totD)+'</strong></span><span>HABER: <strong>'+fmt(totH)+'</strong></span>'+
      '</div>':'')+
    '</div>';
  }

  const months=data.map((m,idx)=>{
    const mes=idx+1;
    const trib=tribData[idx]; // calculated monthly values
    const calcDF=r2(trib.dfIVA);
    const calcCF=r2(trib.cfIVA);
    const calcIT=r2(trib.itAPagar);

        '<div style="font-weight:700;font-size:14px;color:#031740">'+mes+'. '+MESES[idx]+'</div>'+

        (calcDF>0||calcCF>0?'<button onclick="setComp('+mes+',\'compDF\','+calcDF+');setComp('+mes+',\'compCF\','+calcCF+');setComp('+mes+',\'compIT\','+calcIT+');re()" style="background:#031740;color:#fff;border:none;border-radius:5px;padding:3px 10px;font-size:10px;cursor:pointer;font-weight:600">✓ Aplicar todos</button>':'')+
      '</div>':
          '<span style="font-size:10px;color:#aaa">Sin datos calculados (carga RCV y Ventas)</span>')+
      '</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+

      '</div>'+
    '</div>';
  }).join('');

  const totDF=r2(data.reduce((s,m)=>r2(s+pn(m.compDF)),0));
  const totCF=r2(data.reduce((s,m)=>r2(s+pn(m.compCF)),0));
  const totIT=r2(data.reduce((s,m)=>r2(s+pn(m.compIT)),0));
  const totCaja=r2(data.reduce((s,m)=>r2(s+pn(m.compCaja)),0));

  return '<div class="card"><div class="h2">⚖️ Compensaciones por Mes</div>'+
    '<p class="nota">Los campos DF, CF e IT muestran un botón con el valor calculado del sistema (→ clic para aplicar). IUE, Multas y Caja se ingresan siempre de forma manual. El Ajuste CF viene del portal SIN (Cuenta Corriente).</p>'+
    '<div style="background:#031740;color:#fff;border-radius:8px;padding:10px;margin-bottom:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;font-size:11px">'+

      '<div><div style="opacity:.6;font-size:9px">Caja Total</div><div style="font-weight:700;color:#F87171">'+fmt(totCaja)+' Bs</div></div>'+

    months+

function renderSplash(){
  const cfg=emp().cfg;const c=calcAll();
  const bgOK=c.bgOK;const fOK=c.fOK;
  const quickLinks=[
    {id:'apertura',icon:'📂',label:'Asiento de Apertura'},
    {id:'rcv',icon:'🧾',label:'RCV Compras'},
    {id:'ingresos',icon:'💰',label:'Ingresos'},
    {id:'compensaciones',icon:'⚖️',label:'Compensaciones'},
    {id:'ee',icon:'📊',label:'Estados Financieros'},
    {id:'verificaciones',icon:'✅',label:'Verificaciones'},
  ];
  return '<div style="min-height:calc(100vh - 50px);background:#F2F2F2;display:flex;flex-direction:column;align-items:center;padding:32px">'+
    '<div style="margin-bottom:24px"><img src="'+CONTAX_LOGO+'" alt="CONTAX" style="max-width:360px;width:85%;height:auto;display:block;margin:0 auto"/></div>'+
    '<div style="font-size:13px;color:#77888C;margin-bottom:24px;text-align:center">Bienvenido, <strong>'+(getCurrentUser()?.nombre||getUser())+'</strong></div>'+
    (cfg.razonSocial?
      '<div style="background:#031740;color:#fff;border-radius:12px;padding:14px 20px;margin-bottom:20px;width:100%;max-width:700px;display:flex;gap:16px;align-items:center;flex-wrap:wrap">'+
        '<div style="flex:1"><div style="font-size:11px;opacity:.6">EMPRESA ACTIVA</div>'+
          '<div style="font-weight:700;font-size:15px">'+cfg.razonSocial+'</div>'+
          '<div style="font-size:11px;opacity:.7">NIT: '+cfg.nit+' | Gestión '+cfg.gestion+'</div></div>'+
        '<div style="display:flex;gap:12px;flex-wrap:wrap">'+
          '<div style="text-align:center"><div style="font-size:18px;font-weight:700;color:'+(c.tI>0?'#4ADE80':'rgba(255,255,255,.4)')+'">'+fmt(c.tI)+' Bs</div><div style="font-size:10px;opacity:.6">Ingresos</div></div>'+
          '<div style="text-align:center"><div style="font-size:18px;font-weight:700;color:'+(c.util>=0?'#4ADE80':'#F87171')+'">'+fmt(c.util)+' Bs</div><div style="font-size:10px;opacity:.6">'+(c.util>=0?'Utilidad':'Pérdida')+'</div></div>'+
          '<div style="text-align:center;background:rgba(255,255,255,.1);padding:6px 12px;border-radius:8px;font-size:11px">'+

        '</div>'+

    '<div style="width:100%;max-width:700px;margin-bottom:20px">'+
      '<div style="font-size:11px;font-weight:700;color:#77888C;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Acceso Rápido</div>'+
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">'+
        quickLinks.map(l=>'<button onclick="S.tab=\''+l.id+'\';re()" style="padding:12px;background:#fff;border:1px solid #E2E8F0;border-radius:10px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px">'+

        '</button>').join('')+

    '</div>'+
    (S.empresas.length>1?

      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+

  '</div>';
}

function renderVerificaciones(c){
  const{gs,util,tI,tG,tA,tP,tPT,difBG,bgOK,ssOK,fOK,sF,cajaMN,ssTSD,ssTSH}=c;
  const cfg=emp().cfg;
  const gasNoDed=r2(pn(cfg.gasNoDed||0)),perdNComp=r2(pn(cfg.perdNComp||0));
  const resTrib=r2(util+gasNoDed-perdNComp);
  const iue=resTrib>0?r2(resTrib*0.25):0;
  const utilDespues=r2(util-iue);
  const flujoOK=r2(sF-cajaMN)===0;
  function vCard(label,ok,detail,nota){
    return '<div style="background:'+(ok?'#F0FDF4':'#FEF2F2')+';border:1px solid '+(ok?'#BBF7D0':'#FCA5A5')+';border-radius:8px;padding:10px 14px;display:flex;gap:10px;align-items:flex-start">'+
      '<div style="font-size:20px;flex-shrink:0">'+(ok?'✅':'❌')+'</div>'+
      '<div><div style="font-weight:700;font-size:12px;color:'+(ok?'#065F46':'#991B1B')+'">'+label+'</div>'+
        '<div style="font-size:11px;color:'+(ok?'#047857':'#B91C1C')+';margin-top:2px">'+detail+'</div>'+
        (nota?'<div style="font-size:10px;color:#888;margin-top:2px">'+nota+'</div>':'')+
      '</div></div>';
  }
  function vInfo(icon,label,val,nota){
    return '<div style="background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:10px 14px;display:flex;gap:10px;align-items:flex-start">'+
      '<div style="font-size:18px;flex-shrink:0">'+icon+'</div>'+
      '<div><div style="font-weight:600;font-size:12px;color:#031740">'+label+': <span style="font-family:monospace">'+fmt(val)+' Bs</span></div>'+
        (nota?'<div style="font-size:10px;color:#888;margin-top:2px">'+nota+'</div>':'')+
      '</div></div>';
  }
  const allOK=bgOK&&ssOK&&flujoOK&&tI>0;
  const okCount=[bgOK,ssOK,flujoOK,tI>0,difBG===0,r2(ssTSD-ssTSH)===0].filter(Boolean).length;
  const pct=Math.round(okCount/6*100);
  return '<div class="card"><div class="h2">✅ Verificaciones — '+cfg.razonSocial+'</div>'+
    '<div style="background:#031740;border-radius:8px;padding:12px;margin-bottom:14px;color:#fff">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
        '<span style="font-weight:700">Estado General</span>'+
        '<span style="font-size:14px;font-weight:700;color:'+(allOK?'#4ADE80':'#F87171')+'">'+pct+'% — '+(allOK?'✅ LISTO':'⚠️ REVISAR')+'</span>'+
      '</div>'+
      '<div style="background:rgba(255,255,255,.2);border-radius:10px;height:8px">'+
        '<div style="background:'+(pct===100?'#4ADE80':pct>70?'#60A5FA':'#F59E0B')+';height:100%;width:'+pct+'%;border-radius:10px"></div>'+
      '</div>'+
    '</div>'+
    '<div class="h3">ESTADOS FINANCIEROS PRINCIPALES</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">'+
      vCard('Balance General',bgOK,'Activo: '+fmt(tA)+' | Pasivo+Pat.: '+fmt(r2(tP+tPT))+' | Diferencia: '+fmt(difBG),bgOK?'El BG cuadra perfectamente.':'Hay un asiento descuadrado.')+
      vCard('Sumas y Saldos',ssOK,'Deudor: '+fmt(ssTSD)+' | Acreedor: '+fmt(ssTSH)+' | Dif: '+fmt(r2(ssTSD-ssTSH)),'Balance de comprobación SIAT')+
      vCard('Flujo de Efectivo',flujoOK,'Flujo: '+fmt(sF)+' | Caja BG: '+fmt(cajaMN)+' | Dif: '+fmt(r2(sF-cajaMN)),'El flujo debe coincidir con Caja M/N')+
      vCard('Ingresos registrados',tI>0,'Total Ingresos: '+fmt(tI)+' | Total Gastos: '+fmt(tG),tI>0?'Hay ingresos en el sistema.':'Carga el archivo de Ventas.')+
    '</div>'+
    '<div class="h3">ESTADO DE RESULTADOS (E67-E72)</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">'+
      vInfo('📊','Resultado Gestión (E67)',util,util>=0?'Utilidad':'Pérdida')+
      vInfo('📋','Gastos No Deducibles (E68)',gasNoDed,'Editable en ER')+
      vInfo('📉','Pérdida No Compensada (E69)',perdNComp,'Editable en ER')+
      vInfo('🎯','Resultado Tributario (E70)',resTrib,'E67+E68-E69')+
      vInfo('🏛️','IUE 25% (E71)',iue,resTrib>0?'25% del RT':'')+
      vInfo('💡','Después Impuestos (E72)',utilDespues,'E67-E71')+
    '</div>'+
    '<div class="h3">CUENTAS CLAVE</div>'+
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">'+
      vInfo('🔵','CF IVA (116001001)',gs('116001001'),'Crédito Fiscal en Activo')+
      vInfo('🔴','DF IVA (214001001)',gs('214001001'),'Débito Fiscal en Pasivo')+
      vInfo('🟡','IT (214004001)',gs('214004001'),'Impuesto Transacciones')+
      vCard('IUE Por Pagar correcto',Math.abs(r2(gs('214006001')-iue))<0.01||iue===0,'IUE BG: '+fmt(gs('214006001'))+' | Calculado: '+fmt(iue),'')+
      vInfo('📦','IUE A Compensar (116006001)',gs('116006001'),'Activo para compensar')+
      vInfo('⚠️','Multas (214026001)',gs('214026001'),'Por pagar')+
    '</div></div>';
}


// ═══ IMPORTADOR APERTURA DESDE EXCEL ═══════════════════
function importAperturaXLSX(file){
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      // Look for a balance sheet — try common sheet names
      const names=['BalanceGeneral','Balance General','Balance','BG','BALANCE','Hoja1','Sheet1'];
      let ws=null;
      for(const n of names){if(wb.Sheets[n]){ws=wb.Sheets[n];break;}}
      if(!ws){
        // Try first sheet
        ws=wb.Sheets[wb.SheetNames[0]];
      }
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      
      // Find the column with account names and amounts
      // Strategy: scan all rows, find ones that have a numeric code + name + amount
      const entries=[];
      rows.forEach(function(row){
        // Find columns: look for a number in col 0-1, text in col 1-2, number in col 2-5
        let code='',name='',amount=0;
        for(let ci=0;ci<6;ci++){
          const v=row[ci];
          if(v===''||v===null||v===undefined)continue;
          if(!code&&(typeof v==='number'||/^\d{5,}/.test(String(v))))code=String(parseInt(v)||v);
          else if(!name&&typeof v==='string'&&v.trim().length>3)name=v.trim();
          else if(!amount&&typeof v==='number'&&Math.abs(v)>0)amount=v;
        }
        if(name&&Math.abs(amount)>0)entries.push({code,name:name.toUpperCase(),amount});
      });
      
      var _sec='A';entries.forEach(function(e){var n=e.name;if(n==='ACTIVO'||n==='ACTIVOS')_sec='A';else if(n==='PASIVO'||n==='PASIVOS')_sec='P';else if(n.indexOf('PATRIMONIO')===0||n.indexOf('CAPITAL Y RESERVAS')===0)_sec='PT';e.tipo=_sec;});
      // Keyword mapping to our Apertura fields
      const KEYWORDS={
        caja:['CAJA MONEDA NACIONAL','CAJA M/N','CAJA MN','EFECTIVO','CAJA Y EQUIVALENTES','CAJA$'],
        banco:['BANCO','BANCOS','DEPOSITOS','CUENTA CORRIENTE','CUENTA DE AHORRO'],
        cfIva:['CREDITO FISCAL IVA','CREDITO FISCAL','CF IVA','IVA CREDITO','IMPUESTOS ANTICIPADOS IVA'],
        iueComp:['IUE A COMPENSAR','IMPUESTO UTILIDADES COMPENSAR','IUE COMPENSAR'],
        vehiculo:['VEHICULO','VEHICULOS','AUTOMOVIL','CAMIONETA','MOTOCICLETA','TRANSPORTE'],
        depVehiculo:['DEP.*VEHICULO','DEPREC.*VEHICULO','AMORT.*VEHICULO'],
        muebles:['MUEBLES','ENSERES','MOBILIARIO','MUEBLES Y ENSERES'],
        depMuebles:['DEP.*MUEBLE','DEPREC.*MUEBLE'],
        equComp:['EQUIPO.*COMPUTO','COMPUTACION','COMPUTADORA','LAPTOP','PC','SERVIDOR','EQUIPO DE COMPUTO'],
        depEquComp:['DEP.*COMPUTO','DEPREC.*COMPUTO','DEPREC.*COMPUTACION'],
        equCom:['EQUIPO.*COMUNICACION','TELEFONO','RADIO','COMUNICACIONES'],
        depEquCom:['DEP.*COMUNICACION'],
        equOficina:['EQUIPO.*OFICINA','MAQUINARIA.*OFICINA'],
        depEquOficina:['DEP.*OFICINA'],
        equElec:['EQUIPO.*ELECTRONIC','ELECTRONIC'],
        depEquElec:['DEP.*ELECTRONIC'],
        prestamos:['PRESTAMO','CREDITO BANCARIO','DEUDA BANCARIA','FINANCIAMIENTO','HIPOTECA','CAJA MUTUALISTA'],
        dfIva:['DEBITO FISCAL IVA','DEBITO FISCAL','DF IVA','IVA DEBITO','IVA POR PAGAR'],
        itPagar:['IT POR PAGAR','IMPUESTO TRANSACCIONES','IMPUESTO A LAS TRANSACCIONES'],
        iuePagar:['IUE POR PAGAR','IMPUESTO UTILIDADES POR PAGAR'],
        multas:['MULTAS','INTERESES POR PAGAR','MULTAS E INTERESES'],
        capitalSocial:['CAPITAL SOCIAL','CAPITAL PAGADO'],
        ajusteCapital:['AJUSTE.*CAPITAL','AJUSTE DE CAPITAL'],
        resAcum:['RESULTADO.*ACUMULAD','RESULTADOS ACUMULADOS','RESULTADO EJERCICIO ANTERIOR','UTILIDAD.*ANTERIOR','PERDIDA.*ANTERIOR','GANANCIAS ACUMULADAS'],
      };
      
      function matches(name,patterns){
        return patterns.some(function(p){
          if(p.endsWith('$')){return name===p.slice(0,-1);}
          if(p.includes('.*')){const parts=p.split('.*');return parts.every(function(pt){return name.includes(pt);});}
          return name.includes(p);
        });
      }
      
      const found={};
      const unmatched=[];
      entries.forEach(function(entry){
        let mapped=false;
        for(const field in KEYWORDS){
          if(matches(entry.name,KEYWORDS[field])){
            // For depreciation, amount should be negative (credit balance)
            const val=field.startsWith('dep')?-Math.abs(entry.amount):Math.abs(entry.amount);
            if(!found[field]||Math.abs(val)>Math.abs(found[field])){
              found[field]={val:r2(val),name:entry.name,orig:entry.amount};
            }
            mapped=true;break;
          }
        }
        if(!mapped&&Math.abs(entry.amount)>0){
          unmatched.push(entry);
        }
      });
      
      // Show preview dialog
      localStorage.setItem('cx_import_preview',JSON.stringify({found,unmatched:unmatched.slice(0,20)}));
      re();
      S.showImportPreview=true;re();
    }catch(err){
      alert('Error al leer el archivo: '+err.message+'\n\nAsegúrate de que sea un archivo Excel (.xlsx) con una hoja de Balance General.');
    }
  };
  reader.readAsBinaryString(file);
}

function applyImport(found,createNew){
  const tr=emp().traspaso;
  for(const field in found){if(tr.hasOwnProperty(field))tr[field]=Math.abs(found[field].val);}
  if(createNew){
    const toCreate=JSON.parse(localStorage.getItem('cx_import_new')||'[]');
    if(!emp().extraApertura)emp().extraApertura=[];
    toCreate.forEach(function(u,i){
      const tipo=u.tipo||'A';const prefix=tipo==='P'?'2':tipo==='PT'?'3':'1';
      const existing=S.planCuentas.filter(function(a){return a.c&&a.c.startsWith(prefix+'99');});
      const num=existing.length+i+1;
      const code=prefix+'99'+String(num).padStart(3,'0')+'001';
      if(!S.planCuentas.find(function(a){return a.n.toLowerCase()===u.name.toLowerCase();})){
        S.planCuentas.push({c:code,n:u.name,t:tipo});
        if(!emp().extraApertura.find(function(e){return e.cuenta===code;})){emp().extraApertura.push({cuenta:code,monto:r2(Math.abs(u.amount))});}
      }
    });
    localStorage.removeItem('cx_import_new');
  }
  saveLS();S.showImportPreview=false;localStorage.removeItem('cx_import_preview');re();
}

// ─ Main PDF export using print window ─
function buildPrintDocument(sections){
  const cfg=emp().cfg;
  const pageStyle='@page{size:A4;margin:12mm 14mm} body{font-family:Segoe UI,Arial,sans-serif;font-size:11px;color:#0D0D0D;background:#fff} table{width:100%;border-collapse:collapse;font-size:11px} td,th{padding:3px 6px} .pb{page-break-after:always} @media print{.no-print{display:none}}';
  return '<!DOCTYPE html><html><head><meta charset="utf-8"><title>EEFF - '+cfg.razonSocial+'</title><style>'+pageStyle+'</style></head><body>'+
    sections.map(function(s,i){
      return '<div class="'+(i<sections.length-1?'pb':'')+'" style="padding:4mm 0">'+s+'</div>';
    }).join('')+
  '</body></html>'+pdfFirmas(c);
}

function exportPDFAll(){
  const c=calcAll();
  const sections=[
    renderCover(),
    pdfBG(c),
    pdfER(c),
    pdfSS(c),
    pdfFlujo(c),
    pdfPatrimonio(c),
    pdfCuadroAF(),
    pdfTributario(),
    renderNotasEEFF(c),
  ];
  const doc=buildPrintDocument(sections);
  const win=window.open('','_blank','width=900,height=700');
  if(!win){alert('Permite ventanas emergentes para exportar el PDF.');return;}
  win.document.write(doc);
  win.document.close();
  win.onload=function(){win.print();};
}

function exportPDFSingle(tipo,titulo){
  const c=calcAll();
  var section='';
  if(tipo==='bg')section=pdfBG(c);
  else if(tipo==='er')section=pdfER(c);
  else if(tipo==='ss')section=pdfSS(c);
  else if(tipo==='cuadroaf')section=pdfCuadroAF();
  else if(tipo==='flujo')section=pdfFlujo(c);
  else if(tipo==='patrimonio')section=pdfPatrimonio(c);
  else if(tipo==='tributario')section=pdfTributario();
  else if(tipo==='notas')section=renderNotasEEFF(c);
  else if(tipo==='ee')section=pdfBG(c)+'<div style="page-break-after:always"></div>'+pdfER(c);
  const doc=buildPrintDocument([section]);
  const win=window.open('','_blank','width=900,height=700');
  if(!win){alert('Permite ventanas emergentes.');return;}
  win.document.write(doc);win.document.close();
  win.onload=function(){win.print();};
}

function pdfTributario(){
  const cfg=emp().cfg;const data=buildTribResumen();

  const totC=r2(data.reduce(function(s,m){return r2(s+m.compras);},0));
  const totV=r2(data.reduce(function(s,m){return r2(s+m.ventas);},0));
  const totIVA=r2(data.reduce(function(s,m){return r2(s+m.ivaAPagar);},0));
  const totIT=r2(data.reduce(function(s,m){return r2(s+m.itAPagar);},0));
  const rows=data.map(function(m,i){
    return '<tr style="background:'+(i%2?'#F8FAFC':'#fff')+'">'+
      '<td style="font-weight:600">'+(i+1)+'</td>'+
      '<td>'+MESES[i]+'</td>'+
      '<td style="text-align:right;font-family:monospace">'+(m.compras>0?fmt(m.compras):'—')+'</td>'+
      '<td style="text-align:right;font-family:monospace">'+(m.ventas>0?fmt(m.ventas):'—')+'</td>'+
      '<td style="text-align:right;font-family:monospace;color:#77888C">'+(m.cfIVA>0?fmt(m.cfIVA):'—')+'</td>'+
      '<td style="text-align:right;font-family:monospace;color:#77888C">'+(m.dfIVA>0?fmt(m.dfIVA):'—')+'</td>'+
      '<td style="text-align:right;font-family:monospace;color:#DC2626;font-weight:600">'+(m.ivaAPagar>0?fmt(m.ivaAPagar):(m.cfDisponible>0?'CF: '+fmt(m.cfDisponible):'—'))+'</td>'+
      '<td style="text-align:right;font-family:monospace;color:#142740">'+(m.itAPagar>0?fmt(m.itAPagar):'—')+'</td>'+
    '</tr>';
  }).join('');
  return pdfHeader('Resumen Tributario')+
    '<div style="text-align:center;margin-bottom:10px">'+
      '<div style="font-size:13px;font-weight:700;color:#031740">RESUMEN TRIBUTARIO — '+cfg.gestion+'</div>'+
      '<div style="font-size:10px;color:#555">'+cfg.razonSocial+' | NIT: '+cfg.nit+'</div>'+
    '</div>'+
    '<table><thead style="background:#031740;color:#fff;font-size:10px"><tr>'+
      '<th>N°</th><th>Mes</th><th style="text-align:right">Total Compras</th><th style="text-align:right">Total Ventas</th>'+
      '<th style="text-align:right">CF IVA</th><th style="text-align:right">DF IVA</th>'+
      '<th style="text-align:right">IVA a Pagar</th><th style="text-align:right">IT a Pagar</th></tr></thead>'+
    '<tbody>'+rows+'</tbody>'+
    '<tfoot style="background:#031740;color:#fff;font-weight:700"><tr>'+
      '<td colspan="2">TOTALES</td>'+
      '<td style="text-align:right;font-family:monospace">'+fmt(totC)+'</td>'+
      '<td style="text-align:right;font-family:monospace">'+fmt(totV)+'</td>'+
      '<td colspan="2"></td>'+
      '<td style="text-align:right;font-family:monospace">'+fmt(totIVA)+'</td>'+
      '<td style="text-align:right;font-family:monospace">'+fmt(totIT)+'</td></tr></tfoot>'+

}
