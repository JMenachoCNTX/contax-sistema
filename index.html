  afs.forEach((af,i)=>{const tab=TAF[af.tipo];if(!tab)return;const{cA,cD,cG}=tab,vH=r2(af.valorHistorico||0),dAP=r2(Math.abs(af.depAcumAnterior||0));const ajA=ui>0?r2(vH*(uR-1)):0,ajD=ui>0?r2(dAP*(uR-1)):0;if(Math.abs(ajA)>0)E.push({id:'UA'+i,desc:'UFV Activo',lines:[{c:cA,d:ajA,h:0},{c:'441001001',d:0,h:ajA}]});if(Math.abs(ajD)>0)E.push({id:'UD'+i,desc:'UFV DepAcum',lines:[{c:'561001001',d:ajD,h:0},{c:cD,d:0,h:ajD}]});const dep=r2(r2(vH+ajA)*tab.tasa);if(dep>0)E.push({id:'D'+i,desc:'Dep:'+af.nombre,lines:[{c:cG,d:dep,h:0},{c:cD,d:0,h:dep}]});});

function calcAll(emp){
  const{cfg,tr,rcvTxt,ings,afs,ufv}=emp;
  const rcv=parseRCV(rcvTxt||'');
  const E=genEntries(cfg,tr,rcv,ings,afs,ufv);
  const M=buildM(E);
  const gs=k=>r2(M[k]?.saldo||0);
  const tI=r2(Object.entries(M).filter(([k])=>ACC[k]?.t==='I').reduce((s,[,v])=>r2(s+v.saldo),0));
  const tG=r2(Object.entries(M).filter(([k])=>ACC[k]?.t==='G').reduce((s,[,v])=>r2(s+v.saldo),0));
  const util=r2(tI-tG);
  const aC=r2(['111001001','111003001','116001001','116006001'].reduce((s,c)=>r2(s+gs(c)),0));
  const aNC=r2(Object.entries(ACC).filter(([,v])=>v.t==='A'&&v.g==='BIENES DE USO').reduce((s,[k])=>r2(s+gs(k)),0));
  const tA=r2(aC+aNC),tP=r2(Object.entries(ACC).filter(([,v])=>v.t==='P').reduce((s,[k])=>r2(s+gs(k)),0));
  const tPT=r2(Object.entries(ACC).filter(([,v])=>v.t==='PT').reduce((s,[k])=>r2(s+gs(k)),0)+util);
  const difBG=r2(tA-tP-tPT);
  const dep=r2(Object.entries(ACC).filter(([,v])=>v.g==='DEPRECIACIONES').reduce((s,[k])=>r2(s+gs(k)),0));
  const{ufvInicio:ui,ufvFin:uf2}=ufv||{};const uR=ui>0?r2(uf2/ui):1;
  const capT=r2((tr.capitalSocial||0)+(tr.ajusteCapital||0));const ajC=ui>0?r2(capT*(uR-1)):0;
  const gUFV=gs('561001001'),iUFV=gs('441001001');
  const vCF=r2(gs('116001001')-(tr.cfIva||0)),vIC=r2(gs('116006001')-(tr.iueCompensar||0));
  const vDF=r2(gs('214001001')-(tr.dfIva||0)),vIT=r2(gs('214004001')-(tr.itPagar||0));
  const vIUE=r2(gs('214006001')-(tr.iuePagar||0)),vPr=r2(gs('212003001')-(tr.prestamos||0));
  let inv=0;
  (afs||[]).forEach(af=>{const tab=TAF[af.tipo];if(!tab)return;const vH=r2(af.valorHistorico||0);const ajA=ui>0?r2(vH*(uR-1)):0;const keys={VEHÍCULO:'vehiculo','MUEBLES Y ENSERES':'muebles','EQUIPOS DE COMPUTACIÓN':'equipoComp','EQUIPOS DE COMUNICACIONES':'equipoCom','EQUIPO DE OFICINA':'equipoOficina','EQUIPO ELECTRÓNICO':'equipoElec'};const compra=r2(vH-(tr[keys[af.tipo]]||0)-ajA);if(compra>0)inv=r2(inv-compra);});
  const fOp=r2(util+dep+gUFV-iUFV-vCF-vIC+vDF+vIT+vIUE);
  const fFin=r2(-vPr),difF=r2(fOp+inv+fFin),sI=r2(tr.caja||0),sF=r2(sI+difF),cajaMN=gs('111001001');
  const ssA=Object.keys(M).filter(k=>ACC[k]&&(M[k].debe>0||M[k].haber>0));
  const ssTD=r2(ssA.reduce((s,k)=>r2(s+r2(M[k].debe)),0)),ssTH=r2(ssA.reduce((s,k)=>r2(s+r2(M[k].haber)),0));
  const ssTSD=r2(ssA.reduce((s,k)=>r2(s+r2(M[k].sD||0)),0)),ssTSH=r2(ssA.reduce((s,k)=>r2(s+r2(M[k].sH||0)),0));
  return{rcv,E,M,gs,util,tI,tG,aC,aNC,tA,tP,tPT,difBG,dep,gUFV,iUFV,vCF,vIC,vDF,vIT,vIUE,vPr,inv,fOp,fFin,difF,sI,sF,cajaMN,ajC,ssA,ssTD,ssTH,ssTSD,ssTSH,bgOK:difBG===0,ssOK:r2(ssTSD-ssTSH)===0,fOK:r2(sF-cajaMN)===0};
}

    const ingRows=(e.ings||[]).map((ing,i)=>{const neto=r2((ing.monto||0)/1.13),df=r2((ing.monto||0)-neto),it=r2(neto*0.03);return`<div class="ing-row"><div style="flex:.7"><label>Mes</label><select onchange="e=emp();e.ings[${i}].mes=+this.value;saveData();re()">${MESES.map((m,j)=>`<option value="${j+1}"${(ing.mes||1)===j+1?' selected':''}>${m}</option>`).join('')}</select></div><div style="flex:2"><label>Cuenta</label><select onchange="e=emp();e.ings[${i}].cuenta=this.value;saveData();re()">${INCC.map(a=>`<option value="${a.c}"${ing.cuenta===a.c?' selected':''}>${a.n}</option>`).join('')}</select></div><div style="flex:1.5"><label>Monto (con IVA)</label><input type="number" step="0.01" value="${ing.monto||''}" oninput="emp().ings[${i}].monto=+this.value;saveData();re()"/></div><div style="flex:.7;font-size:10px;color:#555;padding-bottom:4px"><div>Neto: <strong>${fmt(neto)}</strong></div><div>DF: <strong>${fmt(df)}</strong></div><div>IT: <strong>${fmt(it)}</strong></div></div><button class="btn-del" onclick="emp().ings.splice(${i},1);saveData();re()">✕</button></div>`;}).join('');
    const tot=r2((e.ings||[]).reduce((s,x)=>r2(s+(x.monto||0)),0));
    return`<div class="card"><div class="ch2">💰 Ingresos del Período</div>
      <p class="nota">Registra cada ingreso cobrado con IVA incluido. El IVA (13%) y el IT (3%) se calculan automáticamente.</p>
      ${ingRows}
      <button class="btn-blue" onclick="emp().ings.push({mes:1,cuenta:'411002002',monto:0});saveData();re()">+ Agregar Ingreso</button>
      ${(e.ings||[]).length?`<div class="info ib" style="margin-top:8px">Cobrado: <strong>${fmt(tot)}</strong> | Neto: <strong>${fmt(r2(tot/1.13))}</strong> | DF IVA: <strong>${fmt(r2(tot*13/113))}</strong> | IT: <strong>${fmt(r2(r2(tot/1.13)*0.03))}</strong></div>`:''}
    </div>`;}

  if(S.tab==='activos'){
    const{ufvInicio:ui2,ufvFin:uf2}=e.ufv||{};const uR2=ui2>0?r2(uf2/ui2):1;
    const afRows=(e.afs||[]).map((af,i)=>{const tab=TAF[af.tipo];const vH=r2(af.valorHistorico||0),dAP=r2(Math.abs(af.depAcumAnterior||0));const ajA=tab&&ui2>0?r2(vH*(uR2-1)):0,ajD=tab&&ui2>0?r2(dAP*(uR2-1)):0;const dep2=tab?r2(r2(vH+ajA)*tab.tasa):0;return`<div class="af-row"><div class="g4"><div><label>Tipo</label><select onchange="emp().afs[${i}].tipo=this.value;saveData();re()"><option value="">Seleccionar...</option>${Object.keys(TAF).map(k=>`<option value="${k}"${af.tipo===k?' selected':''}>${k}</option>`).join('')}</select></div><div><label>Descripción</label><input value="${af.nombre||''}" oninput="emp().afs[${i}].nombre=this.value;saveData()"/></div><div><label>Valor Histórico (Bs)</label><input type="number" step="0.01" value="${af.valorHistorico||''}" oninput="emp().afs[${i}].valorHistorico=+this.value;saveData();re()"/></div><div><label>Dep.Acum. Anterior (Bs)</label><input type="number" step="0.01" value="${af.depAcumAnterior||''}" oninput="emp().afs[${i}].depAcumAnterior=+this.value;saveData();re()"/></div></div>${tab&&vH>0?`<div style="font-size:10px;color:#555;margin-top:6px;display:flex;gap:12px;flex-wrap:wrap;background:#F0FDF4;padding:5px 8px;border-radius:5px"><span>UFV Activo: <strong>${fmt(ajA)}</strong></span><span>Valor actualizado: <strong>${fmt(r2(vH+ajA))}</strong></span><span style="color:#DC2626">Dep.año: <strong>${fmt(dep2)}</strong> (${(tab.tasa*100).toFixed(0)}%)</span><span>UFV Dep.Acum: <strong>${fmt(ajD)}</strong></span><span>Dep.Acum total: <strong>${fmt(r2(dAP+ajD+dep2))}</strong></span></div>`:''}<div style="text-align:right;margin-top:6px"><button class="btn-del" onclick="emp().afs.splice(${i},1);saveData();re()">✕ Eliminar</button></div></div>`;}).join('');
    return`<div class="card"><div class="ch2">🏗️ Activos Fijos</div>
      <p class="nota">Dep. = ROUND(valor_actualizado × tasa, 2). Sin error de decimales acumulados.</p>
      ${afRows}
      <button class="btn-blue" onclick="emp().afs.push({tipo:'',nombre:'',valorHistorico:0,depAcumAnterior:0});saveData();re()">+ Agregar Activo Fijo</button>
    </div>`;}

  if(S.tab==='ee'){
    let ee='';const st=S.sub;
    if(st==='bg'){const pasRows=Object.entries(ACC).filter(([,v])=>v.t==='P').filter(([k])=>gs(k)!==0).map(([k,v])=>`<tr><td style="padding-left:18px">${v.n}</td><td class="r">${fmt(gs(k))}</td></tr>`).join('');const acRows=['111001001','111003001','116001001','116006001'].filter(k=>gs(k)!==0).map(k=>`<tr><td style="padding-left:18px">${ACC[k].n}</td><td class="r">${fmt(gs(k))}</td></tr>`).join('');const ancRows=Object.entries(ACC).filter(([,v])=>v.t==='A'&&v.g==='BIENES DE USO').filter(([k])=>gs(k)!==0).map(([k,v])=>`<tr><td style="padding-left:18px">${v.n}</td><td class="r">${fmt(gs(k))}</td></tr>`).join('');
    ee=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px"><table><thead><tr><th colspan="2">ACTIVO</th></tr></thead><tbody><tr class="tr-g"><td colspan="2">ACTIVO CORRIENTE</td></tr>${acRows}<tr class="tr-t"><td>TOTAL ACTIVO CORRIENTE</td><td class="r">${fmt(aC)}</td></tr><tr class="tr-g"><td colspan="2">ACTIVO NO CORRIENTE</td></tr>${ancRows}<tr class="tr-t"><td>TOTAL ACTIVO NO CORRIENTE</td><td class="r">${fmt(aNC)}</td></tr></tbody><tfoot><tr class="tr-f"><td>TOTAL ACTIVO</td><td class="r">${fmt(tA)}</td></tr></tfoot></table>
    <table><thead><tr><th colspan="2">PASIVO + PATRIMONIO</th></tr></thead><tbody><tr class="tr-g"><td colspan="2">PASIVO CORRIENTE</td></tr>${pasRows}<tr class="tr-t"><td>TOTAL PASIVO</td><td class="r">${fmt(tP)}</td></tr><tr class="tr-g"><td colspan="2">PATRIMONIO</td></tr><tr><td style="padding-left:18px">Capital Social</td><td class="r">${fmt(gs('311001001'))}</td></tr><tr><td style="padding-left:18px">Ajuste del Capital</td><td class="r">${fmt(gs('311002001'))}</td></tr><tr><td style="padding-left:18px">Resultados Acumulados</td><td class="r">${fmt(gs('313001001'))}</td></tr><tr><td style="padding-left:18px">Utilidad de la Gestión</td><td class="r">${fmt(util)}</td></tr><tr class="tr-t"><td>TOTAL PATRIMONIO</td><td class="r">${fmt(tPT)}</td></tr></tbody><tfoot><tr class="tr-f"><td>TOTAL PASIVO + PATRIMONIO</td><td class="r">${fmt(r2(tP+tPT))}</td></tr><tr class="${bgOK?'bok':'ber'}"><td>DIFERENCIA</td><td class="r ${bgOK?'cok':'cer'}">${fmt(difBG)} ${bgOK?'✓':''}</td></tr></tfoot></table></div>`;}
    else if(st==='er'){const grp={};Object.entries(ACC).filter(([,v])=>v.t==='I'||v.t==='G').forEach(([k,v])=>{const s=gs(k);if(!s)return;if(!grp[v.g])grp[v.g]={t:v.t,it:[]};grp[v.g].it.push({k,n:v.n,s});});const iR=Object.entries(grp).filter(([,v])=>v.t==='I').map(([g,d])=>`<tr class="tr-g"><td colspan="2" style="padding-left:8px">${g}</td></tr>${d.it.map(({n,s})=>`<tr><td style="padding-left:22px">${n}</td><td class="r">${fmt(s)}</td></tr>`).join('')}`).join('');const gR=Object.entries(grp).filter(([,v])=>v.t==='G').map(([g,d])=>`<tr class="tr-g"><td colspan="2" style="padding-left:8px">${g}</td></tr>${d.it.map(({n,s})=>`<tr><td style="padding-left:22px">${n}</td><td class="r">${fmt(s)}</td></tr>`).join('')}`).join('');
    ee=`<table><thead><tr><th>CUENTA</th><th class="r">MONTO (Bs)</th></tr></thead><tbody><tr class="tr-i"><td colspan="2">▸ INGRESOS</td></tr>${iR}<tr class="tr-t"><td>TOTAL INGRESOS</td><td class="r" style="color:#059669">${fmt(tI)}</td></tr><tr><td colspan="2" style="padding:3px"></td></tr><tr class="tr-e"><td colspan="2">▸ GASTOS</td></tr>${gR}<tr class="tr-t"><td>TOTAL GASTOS</td><td class="r" style="color:#DC2626">${fmt(tG)}</td></tr></tbody><tfoot><tr class="${util>=0?'bok':'ber'}"><td style="font-weight:700;padding:7px 8px">UTILIDAD DE LA GESTIÓN</td><td class="r" style="color:${util>=0?'#059669':'#DC2626'};font-size:14px;font-weight:700">${fmt(util)}</td></tr></tfoot></table>`;}
    else if(st==='ss'){const rows=ssA.map(k=>`<tr><td style="font-family:monospace;font-size:10px">${k}</td><td>${ACC[k]?.n||k}</td><td class="r">${fmt(r2(M[k].debe))}</td><td class="r">${fmt(r2(M[k].haber))}</td><td class="r">${M[k].sD>0?fmt(r2(M[k].sD)):''}</td><td class="r">${M[k].sH>0?fmt(r2(M[k].sH)):''}</td></tr>`).join('');const difSS=r2(ssTSD-ssTSH);
    ee=`<div class="tbl-wrap"><table><thead><tr><th>CUENTA</th><th>NOMBRE</th><th class="r">SUMAS DEBE</th><th class="r">SUMAS HABER</th><th class="r">SALDO DEUDOR</th><th class="r">SALDO ACREEDOR</th></tr></thead><tbody>${rows}</tbody><tfoot><tr class="tr-f"><td colspan="2">TOTALES</td><td class="r">${fmt(ssTD)}</td><td class="r">${fmt(ssTH)}</td><td class="r">${fmt(ssTSD)}</td><td class="r">${fmt(ssTSH)}</td></tr><tr class="${ssOK?'bok':'ber'}"><td colspan="4"></td><td colspan="2" class="r" style="color:${ssOK?'#059669':'#DC2626'};font-weight:700">Diferencia: ${fmt(difSS)} ${ssOK?'✓':''}</td></tr></tfoot></table></div>`;}
    else if(st==='flujo'){ee=`<table><thead><tr><th>CONCEPTO</th><th class="r">MONTO (Bs)</th></tr></thead><tbody><tr class="tr-g"><td colspan="2">ACTIVIDADES DE OPERACIÓN</td></tr><tr><td style="padding-left:18px">Utilidad de la Gestión</td><td class="r">${fmt(util)}</td></tr><tr><td style="padding-left:18px">+ Depreciaciones (no monetario)</td><td class="r">${fmt(dep)}</td></tr><tr><td style="padding-left:18px">+ Gasto UFV (no monetario)</td><td class="r">${fmt(gUFV)}</td></tr><tr><td style="padding-left:18px">− Ingreso UFV (no monetario)</td><td class="r">${fmt(-iUFV)}</td></tr>${vCF!==0?`<tr><td style="padding-left:18px">Variación CF IVA</td><td class="r">${fmt(-vCF)}</td></tr>`:''}${vIC!==0?`<tr><td style="padding-left:18px">Variación IUE Compensar</td><td class="r">${fmt(-vIC)}</td></tr>`:''}${vDF!==0?`<tr><td style="padding-left:18px">Variación DF IVA</td><td class="r">${fmt(vDF)}</td></tr>`:''}${vIT!==0?`<tr><td style="padding-left:18px">Variación IT Por Pagar</td><td class="r">${fmt(vIT)}</td></tr>`:''}${vIUE!==0?`<tr><td style="padding-left:18px">Variación IUE Por Pagar</td><td class="r">${fmt(vIUE)}</td></tr>`:''}
    <tr class="tr-t"><td>TOTAL OPERACIÓN</td><td class="r">${fmt(fOp)}</td></tr><tr class="tr-g"><td colspan="2">ACTIVIDADES DE INVERSIÓN</td></tr><tr><td style="padding-left:18px">Compras activos fijos (efectivo real)</td><td class="r">${fmt(inv)}</td></tr><tr class="tr-t"><td>TOTAL INVERSIÓN</td><td class="r">${fmt(inv)}</td></tr><tr class="tr-g"><td colspan="2">ACTIVIDADES DE FINANCIAMIENTO</td></tr>${vPr!==0?`<tr><td style="padding-left:18px">Variación Préstamos</td><td class="r">${fmt(-vPr)}</td></tr>`:''}<tr class="tr-t"><td>TOTAL FINANCIAMIENTO</td><td class="r">${fmt(fFin)}</td></tr></tbody><tfoot><tr class="tr-f"><td>DIFERENCIA DE EFECTIVO</td><td class="r">${fmt(difF)}</td></tr><tr><td>Saldo INICIO</td><td class="r">${fmt(sI)}</td></tr><tr class="tr-t"><td>Saldo FINAL (flujo)</td><td class="r" style="font-size:13px">${fmt(sF)}</td></tr><tr><td>Caja M/N según BG</td><td class="r">${fmt(cajaMN)}</td></tr><tr class="${fOK?'bok':'ber'}"><td>DIFERENCIA</td><td class="r ${fOK?'cok':'cer'}">${fmt(r2(sF-cajaMN))} ${fOK?'✓ CUADRADO':''}</td></tr></tfoot></table>`;}
    else if(st==='pat'){const capA=r2((tr.capitalSocial||0)+(tr.ajusteCapital||0)),resA=r2(tr.resultadosAcum||0),capF=r2(capA+ajC);ee=`<table><thead><tr><th>CONCEPTO</th><th class="r">CAPITAL</th><th class="r">RESULT.ACUM.</th><th class="r">UTILIDAD</th><th class="r">TOTAL</th></tr></thead><tbody><tr class="tr-g"><td>Saldo al INICIO</td><td class="r">${fmt(capA)}</td><td class="r">${fmt(resA)}</td><td class="r">${fmt(0)}</td><td class="r">${fmt(r2(capA+resA))}</td></tr>${ajC!==0?`<tr><td style="padding-left:18px">+ Ajuste capital UFV</td><td class="r">${fmt(ajC)}</td><td class="r">—</td><td class="r">—</td><td class="r">${fmt(ajC)}</td></tr>`:''}<tr><td style="padding-left:18px">+ Utilidad del período</td><td class="r">—</td><td class="r">—</td><td class="r">${fmt(util)}</td><td class="r">${fmt(util)}</td></tr></tbody><tfoot><tr class="tr-f"><td>Saldo al FINAL</td><td class="r">${fmt(capF)}</td><td class="r">${fmt(resA)}</td><td class="r">${fmt(util)}</td><td class="r">${fmt(r2(capF+resA+util))}</td></tr></tfoot></table>`;}
    else if(st==='mayor'){const grp2={};Object.entries(M).forEach(([k,v])=>{const t=ACC[k]?.t||'?';if(!grp2[t])grp2[t]=[];grp2[t].push([k,v]);});const tn={A:'ACTIVO',P:'PASIVO',PT:'PATRIMONIO',I:'INGRESO',G:'GASTO'};ee=Object.entries(grp2).map(([t,items])=>`<div style="margin-bottom:14px"><div class="tr-g" style="padding:5px 8px;border-radius:4px;margin-bottom:3px;font-size:11px">${tn[t]||t}</div><table><thead><tr><th>CUENTA</th><th>NOMBRE</th><th class="r">DEBE</th><th class="r">HABER</th><th class="r">SALDO</th></tr></thead><tbody>${items.map(([k,v])=>`<tr><td style="font-family:monospace;font-size:10px">${k}</td><td>${ACC[k]?.n||k}</td><td class="r">${fmt(r2(v.debe))}</td><td class="r">${fmt(r2(v.haber))}</td><td class="r" style="font-weight:600">${fmt(r2(v.saldo))}</td></tr>`).join('')}</tbody></table></div>`).join('');}
    return`<div class="card"><div class="tab-bar">${[['bg','Balance General'],['er','Est. Resultados'],['ss','Sumas y Saldos'],['flujo','Flujo Efectivo'],['pat','Patrimonio'],['mayor','Mayor General']].map(([id,lb])=>sb(id,lb)).join('')}</div><div class="ee-hdr"><div class="ee-title">${{bg:'BALANCE GENERAL',er:'ESTADO DE RESULTADOS',ss:'BALANCE DE COMPROBACIÓN — SUMAS Y SALDOS',flujo:'ESTADO DE FLUJO DE EFECTIVO',pat:'ESTADO DE EVOLUCIÓN DEL PATRIMONIO NETO',mayor:'MAYOR GENERAL'}[st]}</div><div class="ee-sub">${cfg.razonSocial||'Empresa'} | Gestión ${cfg.gestion} | (Expresado en Bolivianos)</div></div>${ee}</div>`;}
  return`<div class="card" style="text-align:center;padding:40px;color:#888">Selecciona una sección del menú para comenzar.</div>`;
}

function re(){
  const c=calcAll(emp());
  const{bgOK,ssOK,fOK,util,rcv}=c;
  const e=emp(),cfg=e.cfg;
  const totCob=r2((e.ings||[]).reduce((s,x)=>r2(s+(x.monto||0)),0));
  const t=new Date();
  document.getElementById('root').innerHTML=`
  ${S.showEmpModal?renderEmpModal():''}
  <div class="hdr">
    <div class="logo">CX</div>
    <div><div style="font-size:14px;font-weight:700">CONTAX — Sistema Contable</div>
    <div style="font-size:10px;opacity:.7">${cfg.razonSocial?cfg.razonSocial+' | NIT: '+cfg.nit+' | Gestión '+cfg.gestion:'Configure los datos del cliente'}</div></div>
    <div class="hdr-right">
      <div class="spill">BG:<span class="${bgOK?'ok':'err'}">${bgOK?'✓':'✗'}</span> S&S:<span class="${ssOK?'ok':'err'}">${ssOK?'✓':'✗'}</span> Flujo:<span class="${fOK?'ok':'err'}">${fOK?'✓':'✗'}</span></div>
      <button class="btn" onclick="S.showEmpModal=true;re()">🏢 ${cfg.razonSocial||'Empresas'} ▾</button>
      <button class="btn-orange" onclick="exportJSON()" style="background:#F59E0B">📤 Guardar JSON</button>
      <button class="btn-green" onclick="exportXL()">📊 Excel</button>
    </div>
  </div>
  <div class="layout">
    <div class="nav">
      <div class="ns">Datos de Entrada</div>
      ${ni('config','🏢','Configuración')}${ni('traspaso','📂','C.Traspaso')}${ni('rcv','🧾','RCV Compras')}${ni('ingresos','💰','Ingresos')}${ni('activos','🏗️','Activos Fijos')}
      <div class="ns">Estados Financieros</div>${ni('ee','📊','Ver Estados')}
      <div class="nsumm"><div>Resumen rápido</div><div>${rcv.filter(r=>r.estado==='CONSOLIDADO').length} comprobantes</div><div>Ingresos: ${fmt(totCob)} Bs</div><div>Utilidad: <span style="color:${util>=0?'#4ADE80':'#F87171'}">${fmt(util)}</span></div><div style="margin-top:4px;color:rgba(255,255,255,.35)">Autoguardado ✓</div></div>
    </div>
    <div class="cnt">${renderMain()}</div>
  </div>`;
}
re();
</script>
