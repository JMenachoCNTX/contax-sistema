    '<tr style="background:#031740;color:#fff"><td style="padding:6px 8px;font-weight:700">SALDO FINAL DE EFECTIVO</td><td style="text-align:right;padding:6px 8px;font-weight:700;font-family:monospace">'+fmt(sF)+'</td></tr>';
  return pdfHeader('Flujo de Efectivo')+
    '<div style="text-align:center;margin-bottom:10px">'+
      '<div style="font-size:14px;font-weight:700;color:#031740">ESTADO DE FLUJO DE EFECTIVO</div>'+
      '<div style="font-size:10px;color:#555">'+cfg.razonSocial+' | '+isoToLocal(cfg.fechaInicio)+' al '+isoToLocal(cfg.fechaFin)+' | (Método Indirecto)</div>'+
    '</div>'+
    '<table><tbody>'+rows+'</tbody></table>'+
    '<div style="margin-top:8px;padding:5px 8px;background:'+(r2(difF)===0||r2(sF-c.cajaMN)===0?'#F0FDF4':'#FEF2F2')+';border-radius:4px;font-size:10px">'+
      'Saldo final calculado: '+fmt(sF)+' Bs | Caja M/N en BG: '+fmt(c.cajaMN)+' Bs | '+(r2(sF-c.cajaMN)===0?'✓ CUADRADO':'✗ Diferencia: '+fmt(r2(sF-c.cajaMN)))+
    '</div>'+pdfFirmas(c);
}

// ─ PDF Evolución de Patrimonio ─
function pdfPatrimonio(c){
  var cfg=emp().cfg;var tr=emp().traspaso;var ajC=c.ajC;var util=c.util;
  var capA=r2(pn(tr.capitalSocial)+pn(tr.ajusteCapital)),resA=r2(pn(tr.resAcum));
  var capF=r2(capA+ajC);
  var patTotal=r2(capF+resA+util);
  return pdfHeader('Evolución del Patrimonio')+
    '<div style="text-align:center;margin-bottom:10px">'+
      '<div style="font-size:14px;font-weight:700;color:#031740">ESTADO DE EVOLUCIÓN DEL PATRIMONIO</div>'+
      '<div style="font-size:10px;color:#555">'+cfg.razonSocial+' | Gestión '+cfg.gestion+'</div>'+
    '</div>'+
    '<table><thead style="background:#031740;color:#fff"><tr>'+
      '<th>CONCEPTO</th><th style="text-align:right">CAPITAL</th>'+
      '<th style="text-align:right">RESULT. ACUM.</th>'+
      '<th style="text-align:right">UTILIDAD</th><th style="text-align:right">TOTAL</th></tr></thead>'+
    '<tbody>'+
      '<tr style="background:#E2E8F0"><td style="font-weight:700;padding:5px 6px">Saldo al INICIO</td>'+
        '<td style="text-align:right;font-family:monospace">'+fmt(capA)+'</td>'+
        '<td style="text-align:right;font-family:monospace">'+fmt(resA)+'</td>'+
        '<td style="text-align:right;font-family:monospace">0,00</td>'+
        '<td style="text-align:right;font-family:monospace;font-weight:700">'+fmt(r2(capA+resA))+'</td></tr>'+
      (ajC?'<tr><td style="padding:3px 6px 3px 18px">+ Ajuste capital con UFV</td>'+
        '<td style="text-align:right;font-family:monospace">'+fmt(ajC)+'</td>'+
        '<td style="text-align:right">—</td><td style="text-align:right">—</td>'+
        '<td style="text-align:right;font-family:monospace">'+fmt(ajC)+'</td></tr>':'')+
      '<tr><td style="padding:3px 6px 3px 18px">+ Utilidad del período</td>'+
        '<td style="text-align:right">—</td><td style="text-align:right">—</td>'+
        '<td style="text-align:right;font-family:monospace">'+fmt(util)+'</td>'+
        '<td style="text-align:right;font-family:monospace">'+fmt(util)+'</td></tr>'+
    '</tbody>'+
    '<tfoot><tr style="background:#031740;color:#fff">'+
      '<td style="padding:6px 8px;font-weight:700">Saldo al FINAL del período</td>'+
      '<td style="text-align:right;font-family:monospace;padding:6px 8px">'+fmt(capF)+'</td>'+
      '<td style="text-align:right;font-family:monospace;padding:6px 8px">'+fmt(resA)+'</td>'+
      '<td style="text-align:right;font-family:monospace;padding:6px 8px">'+fmt(util)+'</td>'+
      '<td style="text-align:right;font-family:monospace;padding:6px 8px;font-weight:700">'+fmt(patTotal)+'</td>'+
    '</tr></tfoot></table>'+pdfFirmas(c);
}


// ═══ MAIN RENDER FUNCTION ════════════════════════════════
function re(){
  const _access=checkAccess();
  if(_access===null) return;
  if(!_access){document.getElementById('root').innerHTML=renderAccessGate();return;}
  try{
    if(S.showLogin||!getCurrentUser()){document.getElementById('root').innerHTML=renderLogin();return;}
  }catch(e){document.getElementById('root').innerHTML=renderLogin();return;}
  const c=calcAll();const{bgOK,ssOK,fOK,util}=c;const cfg=emp().cfg;
  const navSecs=[
    {sec:'Datos de Entrada',items:[
      {id:'splash',ic:'🏠',lb:'Inicio'},
      {id:'config',ic:'🏢',lb:'Configuración'},
      {id:'apertura',ic:'📂',lb:'Asiento de Apertura'},
      {id:'rcv',ic:'🧾',lb:'RCV Compras'},
      {id:'ingresos',ic:'💰',lb:'Ingresos'},
      {id:'compensaciones',ic:'⚖️',lb:'Compensaciones'},
      {id:'otros',ic:'📝',lb:'Otros Asientos'},
      {id:'verificaciones',ic:'✅',lb:'Verificaciones'},
    ]},
    {sec:'Resultados',items:[
      {id:'ee',ic:'📊',lb:'Estados Financieros'},
      {id:'formatoss',ic:'📄',lb:'Formato S&S'},
      {id:'cuadroaf',ic:'🏭',lb:'Cuadro A.F.'},
      {id:'comprobantes',ic:'🗂️',lb:'Comprobantes'},
      {id:'notas',ic:'📋',lb:'Notas EEFF'},
    ]},
    {sec:'Análisis',items:[
      {id:'tributario',ic:'🧾',lb:'Resumen Tributario'},
      {id:'reporte',ic:'📋',lb:'Reporte'},
      {id:'graficos',ic:'📈',lb:'Gráficos'},
    ]},
    {sec:'Configuración',items:[
      {id:'plan',ic:'📋',lb:'Plan de Cuentas'},
      {id:'nits',ic:'🔍',lb:"NIT's"},
      {id:'ufvs',ic:'📈',lb:"UFV's"},
    ]},
    {sec:'Sistema',items:[
      {id:'listaeeff',ic:'📁',lb:'Lista EEFF'},
      {id:'dashboard',ic:'🚀',lb:'Dashboard'},
      {id:'usuarios',ic:'👥',lb:'Usuarios'},
      {id:'iaapi',ic:'🤖',lb:'CONTAX IA'},
    ]},
  ];
  const navHTML=navSecs.map(sec=>'<div class="ns">'+sec.sec+'</div>'+sec.items.map(i=>ni(i.id,i.ic,i.lb)).join('')).join('');
  let main='<div class="card" style="text-align:center;padding:40px;color:#888">Selecciona una sección</div>';
  try{
    if(S.tab==='splash')main=renderSplash();
    else if(S.tab==='config')main=renderConfig(c);
    else if(S.tab==='apertura')main=renderApertura();
    else if(S.tab==='rcv')main=renderRCV();
    else if(S.tab==='ingresos')main=renderIngresos();
    else if(S.tab==='compensaciones')main=renderCompensaciones(c);
    else if(S.tab==='otros')main=renderOtrosAsientos();
    else if(S.tab==='verificaciones')main=renderVerificaciones(c);
    else if(S.tab==='ee')main=renderEE(c);
    else if(S.tab==='formatoss')main=renderFormatoSS(c);
    else if(S.tab==='cuadroaf')main=renderCuadroAF();
    else if(S.tab==='notas')main=renderNotasEEFF(c);
    else if(S.tab==='comprobantes')main=renderComprobantes(c);
    else if(S.tab==='tributario')main=renderTributario();
    else if(S.tab==='reporte')main=renderReporte(c);
    else if(S.tab==='graficos')main=renderGraficos(c);
    else if(S.tab==='plan')main=renderPlan();
    else if(S.tab==='nits')main=renderNITs();
    else if(S.tab==='ufvs')main=renderUFVs();
    else if(S.tab==='listaeeff')main=renderListaEEFF();
    else if(S.tab==='dashboard')main=renderDashboard(c);
    else if(S.tab==='usuarios')main=renderUsuarios();
    else if(S.tab==='iaapi')main=renderIAApi(c);
  }catch(tabErr){
    main='<div class="card ir"><strong>Error en '+S.tab+':</strong><br><code>'+tabErr.message+'</code><br><button class="btn" style="margin-top:8px" onclick="S.tab=\'splash\';re()">← Inicio</button></div>';
  }
  document.getElementById('root').innerHTML=
    (S.showExport?renderExportModal():'')+
    (S.showImportPreview?renderImportPreview():(S.showEmp?renderEmpModal():''))+
    '<div class="hdr">'+
    '<button class="nav-toggle" onclick="S.navOpen=!S.navOpen;re()" title="Menú">'+(S.navOpen?'☰':'▶')+'</button>'+
    '<div onclick="S.tab=\'splash\';re()" style="cursor:pointer;background:rgba(255,255,255,.12);border-radius:6px;padding:2px 4px;display:flex;align-items:center;height:36px"><img src="'+CONTAX_ISOTIPO+'" style="height:30px;width:auto;filter:brightness(0) invert(1);opacity:.9"/></div>'+
    '<div><div style="font-size:14px;font-weight:700">CONTAX</div>'+
    '<div style="font-size:10px;opacity:.7">'+(cfg.razonSocial||'Sistema Contable')+(cfg.razonSocial?' | NIT: '+cfg.nit+' | '+cfg.gestion:'')+'</div></div>'+
    '<div class="hdr-r">'+
    '<div style="font-size:10px;display:flex;gap:8px">BG:<span class="'+(bgOK?'ok':'err')+'">'+(bgOK?'✓':'✗')+'</span> S&S:<span class="'+(ssOK?'ok':'err')+'">'+(ssOK?'✓':'✗')+'</span> Flujo:<span class="'+(fOK?'ok':'err')+'">'+(fOK?'✓':'✗')+'</span></div>'+
    '<span style="font-size:11px;color:rgba(255,255,255,.6)">👤 '+(getCurrentUser()?.nombre||getUser())+'</span>'+
    '<button class="btn" onclick="S.showEmp=true;re()">🏢 '+(cfg.razonSocial||'Empresas')+' ▾</button>'+
    '<button onclick="logout()" style="background:rgba(255,255,255,.1);color:#fff;border:none;border-radius:5px;padding:5px 10px;font-size:11px;cursor:pointer">Salir</button>'+
    '<button onclick="S.showExport=true;re()" style="background:#059669;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;font-weight:700;display:flex;align-items:center;gap:5px">📤 EXPORTAR ▾</button>'+
    '</div></div>'+
    '<div class="layout">'+
    '<div class="nav'+(S.navOpen?'':' collapsed')+'">'+
    (S.navOpen? navHTML+
    '<div class="nsumm">'+
      '<div>'+(emp().rcvData||[]).length+' compras</div>'+
      '<div>'+(emp().ventasData||[]).length+' ventas</div>'+
      '<div>Utilidad: <span style="color:'+(util>=0?'#4ADE80':'#F87171')+'">'+fmt(util)+'</span></div>'+
      '<div style="margin-top:4px;color:rgba(255,255,255,.3)">💾 Auto</div></div>'
    : '')+
    '</div>'+
    '<div class="cnt">'+main+'</div></div>'+renderFloatChat();
}
re();
</script>
