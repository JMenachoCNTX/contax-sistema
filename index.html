// Account lookup by code
function acctName(code){
  const e=S.planCuentas.find(a=>a.c===code);
  return e?e.n:(DEFAULT_PLAN.find(a=>a.c===code)?.n||code);
}

// TIPO categorization
function acctTipo(code){
  if(!code) return '?';
  const c=code.toString()[0];
  if(c==='1') return 'A';
  if(c==='2') return 'P';
  if(c==='3') return 'PT';
  if(c==='4') return 'I';
  if(c==='5') return 'G';
  return '?';
}

// All leaf accounts (9 digits) from plan
function leafAccts(){
  const plan = S.planCuentas.length>0 ? S.planCuentas : DEFAULT_PLAN;
  return plan.filter(a=>a.c&&a.c.length===9);
}

// ─── ACCOUNTING ENGINE ───────────────────────────────────
function parseRCV(txt){
  if(!txt||!txt.trim()) return [];
  return txt.trim().split('\n').map(r=>{
    const c=r.split('\t');
    return{nro:c[0]?.trim(),nit:c[1]?.trim(),razon:c[2]?.trim(),fecha:c[6]?.trim(),
      total:pn(c[7]),ice:pn(c[8]),iehd:pn(c[9]),ipj:pn(c[10]),tasas:pn(c[11]),
      noSujeto:pn(c[12]),exentos:pn(c[13]),baseCF:pn(c[18]),cf:pn(c[19]),
      derechoCF:c[22]?.trim(),estado:c[23]?.trim(),cat:c[24]?.trim()};
  }).filter(r=>r.nro&&!isNaN(parseFloat(r.nro)));
}

function nitLookup(nit){
  const db = S.nits||[];
  const found = db.find(n=>n.nit===nit||n.nit===parseInt(nit));
  if(found) return {cuenta:found.cuenta, cat:found.cat};
  return null;
}

function buildM(entries){
  const M={};
  const add=(c,d,h)=>{if(!c)return;if(!M[c])M[c]={debe:0,haber:0};M[c].debe=r2(M[c].debe+r2(d||0));M[c].haber=r2(M[c].haber+r2(h||0));};
  entries.forEach(e=>(e.lines||[]).forEach(l=>add(l.c,l.d,l.h)));
  Object.keys(M).forEach(k=>{
    const{debe,haber}=M[k],t=acctTipo(k);
    M[k].saldo=(t==='A'||t==='G'||t==='I')?r2(debe-haber):r2(haber-debe);
    M[k].sD=r2(Math.max(0,debe-haber));
    M[k].sH=r2(Math.max(0,haber-debe));
  });
  return M;
}

function ufvAt(dateStr){
  if(!dateStr||!S.ufvData||S.ufvData.length===0) return 0;
  const target=dateStr.trim();
  const found=S.ufvData.find(u=>u.fecha===target);
  return found?pn(found.ufv):0;
}

function genEntries(){
  const E=[];
  const tr=emp().traspaso;
  const ufvIni=pn(emp().cfg.ufvInicio);
  const ufvFin=pn(emp().cfg.ufvFin);
  const uR=ufvIni>0?r2(ufvFin/ufvIni):1;

  // 1. ASIENTO DE APERTURA
  const aLines=[];
  const addA=(c,d,h)=>{if(!c||!pn(d)&&!pn(h))return;aLines.push({c,d:r2(pn(d)),h:r2(pn(h))});};
  // Activos
  [['111001001',tr.caja,0],['111002001',tr.banco,0],['116001001',tr.cfIva,0],['116006001',tr.iueComp,0],
   ['123003001',tr.vehiculo,0],['124001001',0,tr.depVehiculo],
   ['123004001',tr.muebles,0],['124001002',0,tr.depMuebles],
   ['123006001',tr.equComp,0],['124001003',0,tr.depEquComp],
   ['123007001',tr.equCom,0],['124001004',0,tr.depEquCom],
   ['123009001',tr.equOficina,0],['124001005',0,tr.depEquOficina],
   ['123010001',tr.equElec,0],['124001006',0,tr.depEquElec],
  ].forEach(([c,d,h])=>addA(c,d,h));
  // Pasivos y Patrimonio
  [['212003001',0,tr.prestamos],['214001001',0,tr.dfIva],['214004001',0,tr.itPagar],
   ['214006001',0,tr.iuePagar],['214026001',0,tr.multas],
   ['311001001',0,tr.capitalSocial],['311002001',0,tr.ajusteCapital],
   ['313001001',0,tr.resAcum],
  ].forEach(([c,d,h])=>addA(c,d,h));
  E.push({id:'APE',tipo:'T',desc:'ASIENTO DE APERTURA',lines:aLines});

  // 2. OTROS ASIENTOS MANUALES
  (emp().otrosAsientos||[]).forEach((oa,i)=>{
    if(!oa.activo) return;
    const lines=[];
    (oa.lines||[]).forEach(l=>{
      if(!l.cuenta) return;
      const isPred=oa.tipo==='predefined';
      const v=pn(isPred?l.valor:l.debe||l.haber||0);
      if(!v) return;
      const isD=isPred?(l.tipo==='debe'):pn(l.debe)>0;
      lines.push({c:l.cuenta,d:isD?r2(v):0,h:isD?0:r2(v)});
    });
    if(lines.length) E.push({id:'OA'+i,tipo:'T',desc:oa.nombre,lines});
  });

  // 3. RCV COMPRAS
  const rcvRows=parseRCV(emp().rcvTxt||'');
  const valid=rcvRows.filter(r=>r.estado==='CONSOLIDADO');
  if(valid.length){
    const con={};
    valid.forEach(r=>{
      // NIT lookup first, then cat
      const lk=nitLookup(r.nit);
      const code=lk?lk.cuenta:(S.catMap&&S.catMap[r.cat?.trim()])||(r.cat?.trim()==='COMBUSTIBLES'?'532021001':'526002001');
      const totalNeto=r2(r.total-r.ice-r.iehd-r.ipj-r.tasas);
      // Bolivia: 87% gasto, 13% CF. Combustible: 30% no sujeto + 70% base
      let base,cf;
      if(r.noSujeto>0){
        // COMBUSTIBLE: noSujeto=total*30%, base=total*70%
        const base70=r2(totalNeto*0.70);
        cf=r.derechoCF==='SI'?r2(base70*0.13):0;
        base=r2(r.noSujeto+base70*0.87); // noSujeto + 87% del 70%
      } else {
        cf=r.derechoCF==='SI'?r2(totalNeto*0.13):0;
        base=r2(totalNeto*0.87);
      }
      const caja=totalNeto;
      if(!con[code])con[code]={d:0,h:0};con[code].d=r2(con[code].d+base);
      if(cf){if(!con['116001001'])con['116001001']={d:0,h:0};con['116001001'].d=r2(con['116001001'].d+cf);}
      if(!con['111001001'])con['111001001']={d:0,h:0};con['111001001'].h=r2(con['111001001'].h+caja);
    });
    const td=r2(Object.values(con).reduce((s,v)=>r2(s+v.d),0));
    const th=r2(Object.values(con).reduce((s,v)=>r2(s+v.h),0));
    const diff=r2(td-th);
    if(Math.abs(diff)>0.001){if(diff>0){if(!con['561004001'])con['561004001']={d:0,h:0};con['561004001'].h=r2((con['561004001'].h||0)+diff);}else{if(!con['441004001'])con['441004001']={d:0,h:0};con['441004001'].d=r2((con['441004001'].d||0)-diff);}}
    E.push({id:'RCVEGR',tipo:'E',desc:'COMPROBANTE DE EGRESOS — COMPRAS RCV',lines:Object.entries(con).map(([c,v])=>({c,d:v.d,h:v.h}))});
  }

  // 4. INGRESOS
  (emp().ingresos||[]).forEach((ing,i)=>{
    if(!pn(ing.monto)) return;
    const tot=r2(pn(ing.monto));
    // 87% ingreso, 13% DF IVA, 3% IT sobre total ventas (Bolivia)
    const ingNeto=r2(tot*0.87);
    const dfIva=r2(tot*0.13);
    const it=r2(tot*0.03);
    const diff=r2(tot-ingNeto-dfIva);
    const lines=[{c:'111001001',d:tot,h:0},{c:ing.cuenta||'411002002',d:0,h:ingNeto},{c:'214001001',d:0,h:dfIva},{c:'525002001',d:it,h:0},{c:'214004001',d:0,h:it}];
    if(Math.abs(diff)>0.001) lines.push(diff>0?{c:'561004001',d:0,h:diff}:{c:'441004001',d:-diff,h:0});
    E.push({id:'ING'+i,tipo:'I',desc:'INGRESO '+(ing.mes?['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'][ing.mes-1]:i+1),lines});
  });

  // 5. ACTIVOS FIJOS — UFV + DEPRECIACIÓN (calculados)
  (emp().activos||[]).forEach((af,i)=>{
    const TAF={'VEHÍCULO':{vida:5,tasa:.20,cA:'123003001',cD:'124001001',cG:'524001005'},'MUEBLES Y ENSERES':{vida:10,tasa:.10,cA:'123004001',cD:'124001002',cG:'524001004'},'EQUIPOS DE COMPUTACIÓN':{vida:4,tasa:.25,cA:'123006001',cD:'124001003',cG:'524001002'},'EQUIPOS DE COMUNICACIONES':{vida:5,tasa:.20,cA:'123007001',cD:'124001004',cG:'524001001'},'EQUIPO DE OFICINA':{vida:10,tasa:.10,cA:'123009001',cD:'124001005',cG:'524001006'},'EQUIPO ELECTRÓNICO':{vida:4,tasa:.25,cA:'123010001',cD:'124001006',cG:'524001003'}};
    const tab=TAF[af.tipo];if(!tab)return;
    const vH=r2(pn(af.valorHistorico));
    const dAP=r2(Math.abs(pn(af.depAcumAnterior)));
    const ajA=ufvIni>0?r2(vH*(uR-1)):0;
    const ajD=ufvIni>0?r2(dAP*(uR-1)):0;
    if(Math.abs(ajA)>0) E.push({id:'UFVA'+i,tipo:'T',desc:'UFV ACTIVO: '+af.nombre,lines:[{c:tab.cA,d:ajA,h:0},{c:'441001001',d:0,h:ajA}]});
    if(Math.abs(ajD)>0) E.push({id:'UFVD'+i,tipo:'T',desc:'UFV DEP.ACUM: '+af.nombre,lines:[{c:'561001001',d:ajD,h:0},{c:tab.cD,d:0,h:ajD}]});
    const dep=r2(r2(vH+ajA)*tab.tasa);
    if(dep>0) E.push({id:'DEP'+i,tipo:'T',desc:'DEPRECIACIÓN: '+af.nombre,lines:[{c:tab.cG,d:dep,h:0},{c:tab.cD,d:0,h:dep}]});
  });

  // 6. UFV CAPITAL
  const capT=r2(pn(tr.capitalSocial)+pn(tr.ajusteCapital));
  const ajC=ufvIni>0?r2(capT*(uR-1)):0;
  if(Math.abs(ajC)>0) E.push({id:'UFVCAP',tipo:'T',desc:'AJUSTE DE CAPITAL POR UFV',lines:[{c:'561001001',d:ajC,h:0},{c:'311002001',d:0,h:ajC}]});

  // 7. IUE provisional
  const mT=buildM(E);
  const tI=r2(Object.entries(mT).filter(([k])=>acctTipo(k)==='I').reduce((s,[,v])=>r2(s+v.saldo),0));
  const tG=r2(Object.entries(mT).filter(([k])=>acctTipo(k)==='G').reduce((s,[,v])=>r2(s+v.saldo),0));
  const util=r2(tI-tG);
  const iue=util>0?r2(util*0.25):0;
  if(iue>0) E.push({id:'IUE',tipo:'T',desc:'PROVISIÓN IUE',lines:[{c:'116006001',d:iue,h:0},{c:'214006001',d:0,h:iue}]});

  // 8. COMPENSACIÓN IVA
  const m2=buildM(E);
  const dfS=r2(m2['214001001']?.saldo||0),cfS=r2(m2['116001001']?.saldo||0);
  const comp=r2(Math.min(dfS,cfS));
  if(comp>0){
    E.push({id:'CMP1',tipo:'T',desc:'COMPENSACIÓN CF VS DF IVA',lines:[{c:'214001001',d:comp,h:0},{c:'116001001',d:0,h:comp}]});
    const dfR=r2(dfS-comp);
    if(dfR>0.01) E.push({id:'CMP2',tipo:'T',desc:'PAGO DF IVA PENDIENTE',lines:[{c:'214001001',d:dfR,h:0},{c:'111001001',d:0,h:dfR}]});
  }

  return E;
}

function calcAll(){
  const E=genEntries();
  const M=buildM(E);
  const gs=k=>r2(M[k]?.saldo||0);
  const tI=r2(Object.entries(M).filter(([k])=>acctTipo(k)==='I').reduce((s,[,v])=>r2(s+v.saldo),0));
  const tG=r2(Object.entries(M).filter(([k])=>acctTipo(k)==='G').reduce((s,[,v])=>r2(s+v.saldo),0));
  const util=r2(tI-tG);
  const aC=r2(['111001001','111002001','116001001','116006001'].reduce((s,c)=>r2(s+gs(c)),0));
  const aNC=r2(Object.entries(M).filter(([k])=>acctTipo(k)==='A'&&k.startsWith('12')).reduce((s,[k])=>r2(s+gs(k)),0));
  const tA=r2(aC+aNC);
  const tP=r2(Object.entries(M).filter(([k])=>acctTipo(k)==='P').reduce((s,[k])=>r2(s+gs(k)),0));
  const tPT=r2(Object.entries(M).filter(([k])=>acctTipo(k)==='PT').reduce((s,[k])=>r2(s+gs(k)),0)+util);
  const difBG=r2(tA-tP-tPT);
  const dep=r2(Object.entries(M).filter(([k])=>k.startsWith('524')).reduce((s,[k])=>r2(s+gs(k)),0));
  const ufvIni=pn(emp().cfg.ufvInicio),ufvFin=pn(emp().cfg.ufvFin);
  const uR=ufvIni>0?r2(ufvFin/ufvIni):1;
  const capT=r2(pn(emp().traspaso.capitalSocial)+pn(emp().traspaso.ajusteCapital));
  const ajC=ufvIni>0?r2(capT*(uR-1)):0;
  const gUFV=gs('561001001'),iUFV=gs('441001001');
  const vCF=r2(gs('116001001')-pn(emp().traspaso.cfIva));
  const vIC=r2(gs('116006001')-pn(emp().traspaso.iueComp));
  const vDF=r2(gs('214001001')-pn(emp().traspaso.dfIva));
  const vIT=r2(gs('214004001')-pn(emp().traspaso.itPagar));
  const vIUE=r2(gs('214006001')-pn(emp().traspaso.iuePagar));
  const vPr=r2(gs('212003001')-pn(emp().traspaso.prestamos));
  let inv=0;
  (emp().activos||[]).forEach(af=>{
    const TAF={'VEHÍCULO':'vehiculo','MUEBLES Y ENSERES':'muebles','EQUIPOS DE COMPUTACIÓN':'equComp','EQUIPOS DE COMUNICACIONES':'equCom','EQUIPO DE OFICINA':'equOficina','EQUIPO ELECTRÓNICO':'equElec'};
    const vH=r2(pn(af.valorHistorico));const ajA=ufvIni>0?r2(vH*(uR-1)):0;
    const k2=TAF[af.tipo];const sAnt=r2(pn(emp().traspaso[k2]||0));
    const compra=r2(vH-sAnt-ajA);if(compra>0)inv=r2(inv-compra);
  });
  const fOp=r2(util+dep+gUFV-iUFV-vCF-vIC+vDF+vIT+vIUE);
  const fFin=r2(-vPr),difF=r2(fOp+inv+fFin);
  const sI=r2(pn(emp().traspaso.caja)),sF=r2(sI+difF),cajaMN=gs('111001001');
  const ssA=Object.keys(M).filter(k=>M[k].debe>0||M[k].haber>0).sort();
  const ssTD=r2(ssA.reduce((s,k)=>r2(s+r2(M[k].debe)),0));
  const ssTH=r2(ssA.reduce((s,k)=>r2(s+r2(M[k].haber)),0));
  const ssTSD=r2(ssA.reduce((s,k)=>r2(s+r2(M[k].sD||0)),0));
  const ssTSH=r2(ssA.reduce((s,k)=>r2(s+r2(M[k].sH||0)),0));
  return{E,M,gs,util,tI,tG,aC,aNC,tA,tP,tPT,difBG,dep,gUFV,iUFV,vCF,vIC,vDF,vIT,vIUE,vPr,inv,fOp,fFin,difF,sI,sF,cajaMN,ajC,ssA,ssTD,ssTH,ssTSD,ssTSH,bgOK:difBG===0,ssOK:r2(ssTSD-ssTSH)===0,fOK:r2(sF-cajaMN)===0};
}

function pasteUFV(txt){
  const rows=txt.trim().split('\n').map(r=>r.split('\t'));
  const data=[];
  rows.forEach(r=>{
    const fechaRaw=r[0]?.trim();const ufv=r[1]?.trim();
    if(!fechaRaw||!ufv) return;
    // Parse date dd/mm/yyyy or ISO
    let fecha=fechaRaw;
    if(fechaRaw.includes('/')) {
      const parts=fechaRaw.split('/');
      if(parts.length===3) fecha=parts[2].length===4?`${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`:fechaRaw;
    }
    data.push({fecha,ufv});
  });
  S.ufvData=data;saveLS();re();
  alert(`✓ ${data.length} UFVs cargadas`);
}

function renderCuadroAF(){
  const ufvIni=pn(emp().cfg.ufvInicio),ufvFin=pn(emp().cfg.ufvFin);
  const uR=ufvIni>0?r2(ufvFin/ufvIni):1;
  const TAF={'VEHÍCULO':{vida:5,tasa:.20,cA:'123003001',cD:'124001001',cG:'524001005'},'MUEBLES Y ENSERES':{vida:10,tasa:.10,cA:'123004001',cD:'124001002',cG:'524001004'},'EQUIPOS DE COMPUTACIÓN':{vida:4,tasa:.25,cA:'123006001',cD:'124001003',cG:'524001002'},'EQUIPOS DE COMUNICACIONES':{vida:5,tasa:.20,cA:'123007001',cD:'124001004',cG:'524001001'},'EQUIPO DE OFICINA':{vida:10,tasa:.10,cA:'123009001',cD:'124001005',cG:'524001006'},'EQUIPO ELECTRÓNICO':{vida:4,tasa:.25,cA:'123010001',cD:'124001006',cG:'524001003'}};
  const rows=(emp().activos||[]).map(af=>{
    const tab=TAF[af.tipo];if(!tab)return '';
    const vH=r2(pn(af.valorHistorico));
    const dAP=r2(pn(af.depAcumAnterior));
    const ajA=ufvIni>0?r2(vH*(uR-1)):0;
    const vAct=r2(vH+ajA);
    const dep=r2(vAct*tab.tasa);
    const ajD=ufvIni>0?r2(dAP*(uR-1)):0;
    const depAcumTotal=r2(dAP+ajD+dep);
    const valorNeto=r2(vAct-depAcumTotal);
    return`<tr>
      <td>${af.nombre||af.tipo}</td>
      <td class="r">${fmt(vH)}</td>
      <td class="r">${fmt(ajA)}</td>
      <td class="r">${fmt(vAct)}</td>
      <td class="r">${fmt(dAP>0?-dAP:0)}</td>
      <td class="r">${fmt(dep)}</td>
      <td class="r">${fmt(ajD>0?-ajD:0)}</td>
      <td class="r" style="font-weight:700;color:#DC2626">${fmt(-depAcumTotal)}</td>
      <td class="r" style="font-weight:700;color:#059669">${fmt(valorNeto)}</td>
      <td class="r" style="font-size:10px">${(tab.tasa*100).toFixed(0)}%</td>
    </tr>`;
  }).join('');
  const totVH=r2((emp().activos||[]).reduce((s,af)=>r2(s+pn(af.valorHistorico)),0));
  return`<div class="card">
    <div class="h2">📊 Cuadro de Activos Fijos</div>
    <div class="ee-sub" style="margin-bottom:12px">${emp().cfg.razonSocial||'Empresa'} | Gestión ${emp().cfg.gestion} | Del ${emp().cfg.fechaInicio} al ${emp().cfg.fechaFin}</div>

          <th rowspan="2">DESCRIPCIÓN</th>
          <th class="r" rowspan="2">VALOR ACTUAL</th>
          <th class="r" rowspan="2">INCR. UFV</th>
          <th class="r" rowspan="2">VALOR ACTUALIZ.</th>
          <th class="r" colspan="3">DEPRECIACIÓN</th>
          <th class="r" rowspan="2">DEP. ACUM. TOTAL</th>
          <th class="r" rowspan="2">VALOR NETO</th>
          <th class="r" rowspan="2">TASA</th>
        </tr>
        <tr>
          <th class="r">Acum. Anterior</th>
          <th class="r">Del Año</th>
          <th class="r">UFV Dep.Acum</th>
        </tr>
      </thead>
      <tbody>${rows||'<tr><td colspan="10" style="text-align:center;color:#888;padding:20px">No hay activos registrados</td></tr>'}</tbody>
      <tfoot><tr class="tr-f"><td>TOTALES</td><td class="r">${fmt(totVH)}</td><td colspan="8"></td></tr></tfoot>

      </table></div>`).join('');
  }

  return`<div class="card">
    <div class="tab-bar">${[['bg','Balance General'],['er','Est. Resultados'],['ss','Sumas y Saldos'],['flujo','Flujo Efectivo'],['pat','Patrimonio'],['mayor','Mayor General']].map(([id,lb])=>sb(id,lb)).join('')}</div>
    <div class="ee-hdr">
      <div class="ee-title">${{bg:'BALANCE GENERAL',er:'ESTADO DE RESULTADOS',ss:'BALANCE DE COMPROBACIÓN — SUMAS Y SALDOS',flujo:'ESTADO DE FLUJO DE EFECTIVO',pat:'ESTADO DE EVOLUCIÓN DEL PATRIMONIO NETO',mayor:'MAYOR GENERAL'}[st]||''}</div>
      <div class="ee-sub">${cfg.razonSocial||'Empresa'} | ${cfg.fechaInicio||''} al ${cfg.fechaFin||''} | (Expresado en Bolivianos)</div>
    </div>

}

function getUser(){return localStorage.getItem('contax_user')||'Usuario';}
function setUser(u){localStorage.setItem('contax_user',u);}
function logAudit(action){
  const logs=JSON.parse(localStorage.getItem('contax_audit')||'[]');
  logs.unshift({user:getUser(),action,ts:new Date().toISOString(),empresa:emp().cfg.razonSocial||'—'});
  if(logs.length>200) logs.splice(100);
  localStorage.setItem('contax_audit',JSON.stringify(logs));
}
function getAudit(){return JSON.parse(localStorage.getItem('contax_audit')||'[]');}
function getUserStats(){
  const logs=getAudit();const stats={};
  logs.forEach(l=>{if(!stats[l.user])stats[l.user]={count:0,empresas:new Set()};stats[l.user].count++;if(l.empresa)stats[l.user].empresas.add(l.empresa);});
  return Object.entries(stats).map(([u,s])=>({user:u,count:s.count,empresas:s.empresas.size}));
}

// ─── FIX 9: GRÁFICOS ─────────────────────────────────────
function renderGraficos(c){
  const{util,tI,tG,gs,M}=c;
  const cfg=emp().cfg;
  const NAVY='#1C2B4B',BLUE='#3B82F6',TEAL='#0891B2',SLATE='#475569',STEEL='#64748B',MIST='#94A3B8',LIGHT='#CBD5E1';
  const palette=[NAVY,BLUE,TEAL,SLATE,STEEL,MIST,LIGHT,'#1E40AF','#0369A1','#0F766E'];
  // Income by account
  const incAccts=Object.keys(M).filter(k=>acctTipo(k)==='I'&&gs(k)>0).map(k=>({n:acctName(k).substring(0,20),v:gs(k)}));
  const gtoAccts=Object.keys(M).filter(k=>acctTipo(k)==='G'&&gs(k)>0).sort((a,b)=>gs(b)-gs(a)).slice(0,8).map(k=>({n:acctName(k).substring(0,20),v:gs(k)}));
  const svgPie=(items,title)=>{
    const total=items.reduce((s,x)=>s+x.v,0);if(!total)return`<div style="text-align:center;color:#888;padding:20px">Sin datos</div>`;
    let start=0;
    const slices=items.map((item,i)=>{
      const pct=item.v/total;const angle=pct*360;
      const r=80;const cx=100;const cy=100;
      const startRad=start*Math.PI/180;const endRad=(start+angle)*Math.PI/180;
      const x1=cx+r*Math.sin(startRad);const y1=cy-r*Math.cos(startRad);
      const x2=cx+r*Math.sin(endRad);const y2=cy-r*Math.cos(endRad);
      const large=angle>180?1:0;
      const path=`M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r},0,${large},1,${x2.toFixed(1)},${y2.toFixed(1)} Z`;
      start+=angle;
      return`<path d="${path}" fill="${palette[i%palette.length]}" stroke="#fff" stroke-width="2" opacity="0.9">
        <title>${item.n}: ${fmt(item.v)}</title></path>`;
    }).join('');
    const legend=items.map((item,i)=>`<div style="display:flex;align-items:center;gap:4px;font-size:10px;margin-bottom:2px"><div style="width:10px;height:10px;border-radius:2px;background:${palette[i%palette.length]};flex-shrink:0"></div><span>${item.n}: ${fmt(item.v)}</span></div>`).join('');
    return`<div style="display:flex;gap:12px;align-items:center">
      <svg viewBox="0 0 200 200" width="160" height="160"><text x="100" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#1C2B4B">${title}</text>${slices}</svg>
      <div style="flex:1">${legend}</div>
    </div>`;
  };
  const svgBar=(items,title)=>{
    if(!items.length)return`<div style="text-align:center;color:#888;padding:20px">Sin datos</div>`;
    const max=Math.max(...items.map(x=>x.v));
    const bars=items.map((item,i)=>{
      const h=max>0?Math.round((item.v/max)*100):0;
      const bw=Math.floor(280/items.length)-6;
      const x=i*(bw+6)+10;
      return`<g><rect x="${x}" y="${110-h}" width="${bw}" height="${h}" fill="${palette[i%palette.length]}" rx="2"><title>${item.n}: ${fmt(item.v)}</title></rect>
        <text x="${x+bw/2}" y="120" text-anchor="middle" font-size="8" fill="#555">${item.n.substring(0,8)}</text></g>`;
    }).join('');
    return`<svg viewBox="0 0 300 130" width="100%" style="max-width:400px"><text x="150" y="14" text-anchor="middle" font-size="11" font-weight="bold" fill="#1C2B4B">${title}</text>${bars}</svg>`;
  };
  const activo=r2(c.tA);const pasivo=r2(c.tP);const patrimonio=r2(c.tPT);
  return`<div class="card">
    <div class="h2">📈 Gráficos — ${cfg.razonSocial||'Empresa'} | Gestión ${cfg.gestion}</div>
    <div class="g2">
      <div class="card" style="box-shadow:none;border:1px solid #E2E8F0">
        <div class="h3">RESULTADO DE LA GESTIÓN</div>
        <div style="text-align:center;padding:10px">
          ${svgPie([{n:'Ingresos',v:tI},{n:'Gastos',v:tG}],'Ing vs Gasto')}
          <div style="margin-top:10px;font-size:13px"><strong style="color:${util>=0?'#059669':'#DC2626'}">${util>=0?'UTILIDAD':'PÉRDIDA'}: ${fmt(Math.abs(util))} Bs</strong></div>
        </div>
      </div>
      <div class="card" style="box-shadow:none;border:1px solid #E2E8F0">
        <div class="h3">ESTRUCTURA DEL BALANCE</div>
        <div style="text-align:center;padding:10px">
          ${svgPie([{n:'Activo',v:activo},{n:'Pasivo',v:pasivo},{n:'Patrimonio',v:patrimonio}],'Balance')}
        </div>
      </div>
      <div class="card" style="box-shadow:none;border:1px solid #E2E8F0;grid-column:1/-1">
        <div class="h3">PRINCIPALES GASTOS</div>
        ${svgBar(gtoAccts,'Top Gastos del Período')}
      </div>
      ${incAccts.length>1?`<div class="card" style="box-shadow:none;border:1px solid #E2E8F0;grid-column:1/-1">
        <div class="h3">DESGLOSE DE INGRESOS</div>
        ${svgPie(incAccts,'Ingresos')}
      </div>`:''}
    </div>
  </div>`;
}

function renderReporte(c){

  const margenUtil=tI>0?r2(util/tI*100):0;

    <div style="font-size:11px;color:#666;margin-top:2px">${label}</div>

      const d=await r.json();resp=d.choices?.[0]?.message?.content||d.error?.message||'Error';
    } else {
      const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:ctx+'
'+msgs.map(m=>m.role+': '+m.content).join('
')}]}]})});
      const d=await r.json();resp=d.candidates?.[0]?.content?.parts?.[0]?.text||d.error?.message||'Error';

function calcProgress(item){
  let pts=0,total=10;
  if(item.razonSocial) pts++;
  if(item.nit) pts++;
  if(item.gestion) pts++;
  if(item.rcvOk) pts++;
  if(item.ingresosOk) pts++;
  if(item.activosOk) pts++;
  if(item.bgOk) pts++;
  if(item.ssOk) pts++;
  if(item.flujoOk) pts++;
  if(item.estado==='terminado') pts++;
  return Math.round(pts/total*100);
}
function syncCurrentEmpresa(lista){
  const c=calcAll();const cfg=emp().cfg;
  const idx=lista.findIndex(i=>i.empresaId===S.activeId);
  const item={
    empresaId:S.activeId,razonSocial:cfg.razonSocial,nit:cfg.nit,gestion:cfg.gestion,
    usuario:getUser(),bgOk:c.bgOK,ssOk:c.ssOK,flujoOk:c.fOK,
    utilidad:c.util,rcvOk:parseRCV(emp().rcvTxt||'').length>0,
    ingresosOk:(emp().ingresos||[]).some(i=>pn(i.monto)>0),
    activosOk:(emp().activos||[]).length>0||Object.keys(c.M).some(k=>k.startsWith('12')),
    updatedAt:new Date().toISOString()
  };

  else{lista.push({...item,estado:'en-curso',creadoAt:new Date().toISOString()});}
  return lista;
}

      <div class="card">

        ${audit.slice(0,8).map(l=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #F0F2F5;font-size:11px"><span>👤 <strong>${l.user}</strong>: ${l.action}</span><span style="color:#888;font-size:10px">${new Date(l.ts).toLocaleTimeString('es-BO')}</span></div>`).join('')||'<div style="color:#888;font-size:11px;padding:8px 0">Sin actividad reciente</div>'}
        <div style="margin-top:10px">
          <div class="h3">PROGRESO TOTAL</div>
          ${lista.slice(0,5).map(item=>{const p=calcProgress(item);return`<div style="margin-bottom:6px"><div style="display:flex;justify-content:space-between;font-size:10px"><span>${item.razonSocial||'Sin nombre'}</span><span>${p}%</span></div><div style="background:#E8EAED;border-radius:4px;height:6px"><div style="background:${p===100?'#059669':'#3B82F6'};height:100%;width:${p}%;border-radius:4px"></div></div></div>`;}).join('')}
        </div>
      </div>
    </div>
  </div>`;
}


// ─── MAIN RENDER ─────────────────────────────────────────
function re(){
  const c=calcAll();
  const{bgOK,ssOK,fOK,util}=c;
  const cfg=emp().cfg;
  const totCob=r2((emp().ingresos||[]).reduce((s,x)=>r2(s+pn(x.monto)),0));

  const navItems=[
    {sec:'Datos de Entrada',items:[
      {id:'config',icon:'🏢',label:'Configuración'},
      {id:'apertura',icon:'📂',label:'Asiento de Apertura'},
      {id:'rcv',icon:'🧾',label:'RCV Compras'},
      {id:'ingresos',icon:'💰',label:'Ingresos'},
      {id:'activos',icon:'🏗️',label:'Activos Fijos'},
    ]},
    {sec:'Configuración',items:[
      {id:'ufvs',icon:'📈',label:"UFV's"},
      {id:'nits',icon:'🔍',label:"NIT's"},
      {id:'plan',icon:'📋',label:'Plan de Cuentas'},
      {id:'otros',icon:'📝',label:'Otros Asientos'},
    ]},
    {sec:'Resultados',items:[
      {id:'comprobantes',icon:'🗂️',label:'Comprobantes'},
      {id:'cuadroaf',icon:'🏭',label:'Cuadro Activos Fijos'},
      {id:'formatoss',icon:'📄',label:'Formato S&S'},
      {id:'ee',icon:'📊',label:'Estados Financieros'},
    ]},
    {sec:'Análisis',items:[
      {id:'graficos',icon:'📈',label:'Gráficos'},
      {id:'reporte',icon:'📋',label:'Reporte'},
      {id:'dashboard',icon:'🚀',label:'Dashboard'},
    ]},
    {sec:'Sistema',items:[
      {id:'listaeeff',icon:'📁',label:'Lista EEFF'},
      {id:'usuarios',icon:'👤',label:'Usuarios'},
      {id:'iaapi',icon:'🤖',label:'IA Asistente'},
    ]},
  ];

  const navHTML=navItems.map(sec=>`
    <div class="ns">${sec.sec}</div>
    ${sec.items.map(i=>`<div class="ni${S.tab===i.id?' a':''}" onclick="S.tab='${i.id}';re()">${i.icon} ${i.label}</div>`).join('')}
  `).join('');

  let main='';
  if(S.tab==='config') main=renderConfig(c);
  else if(S.tab==='apertura') main=renderApertura();
  else if(S.tab==='rcv') main=renderRCV();
  else if(S.tab==='ingresos') main=renderIngresos(c);
  else if(S.tab==='activos') main=renderActivos();
  else if(S.tab==='ufvs') main=renderUFVs();
  else if(S.tab==='nits') main=renderNITs();
  else if(S.tab==='plan') main=renderPlanCuentas();
  else if(S.tab==='otros') main=renderOtrosAsientos(c);
  else if(S.tab==='comprobantes') main=renderComprobantes(c);
  else if(S.tab==='cuadroaf') main=renderCuadroAF();
  else if(S.tab==='formatoss') main=renderFormatoSS(c);
  else if(S.tab==='graficos') main=renderGraficos(c);
  else if(S.tab==='reporte') main=renderReporte(c);
  else if(S.tab==='dashboard') main=renderDashboard(c);
  else if(S.tab==='listaeeff') main=renderListaEEFF();
  else if(S.tab==='usuarios') main=renderUsuarios();
  else if(S.tab==='iaapi') main=renderIAApi(c);
  else if(S.tab==='ee') main=renderEE(c);

  document.getElementById('root').innerHTML=`
    ${S.showEmpModal?renderEmpModal():''}
    <div class="hdr">
      <div class="logo" onclick="S.showEmpModal=true;re()">CX</div>
      <div>
        <div style="font-size:14px;font-weight:700">CONTAX — Sistema Contable v2</div>
        <div style="font-size:10px;opacity:.7">${cfg.razonSocial||'Configure los datos del cliente'} ${cfg.razonSocial?' | NIT: '+cfg.nit+' | '+cfg.fechaInicio+' → '+cfg.fechaFin:''}</div>
      </div>
      <div class="hdr-r">
        <div style="font-size:10px;display:flex;gap:8px">
          BG:<span class="${bgOK?'ok':'err'}">${bgOK?'✓':'✗'}</span>
          S&S:<span class="${ssOK?'ok':'err'}">${ssOK?'✓':'✗'}</span>
          Flujo:<span class="${fOK?'ok':'err'}">${fOK?'✓':'✗'}</span>
        </div>
        <button class="btn" onclick="S.showEmpModal=true;re()">🏢 ${cfg.razonSocial||'Empresas'} ▾</button>
        <button class="btn-orange" onclick="exportJSON()" style="background:#F59E0B">📤 Guardar JSON</button>
        <button class="btn-green" onclick="exportXL()">📊 Exportar Excel</button>
      </div>
    </div>
    <div class="layout">
      <div class="nav">
        ${navHTML}
        <div class="nsumm">
          <div>${(parseRCV(emp().rcvTxt||'')).filter(r=>r.estado==='CONSOLIDADO').length} facturas</div>
          <div>Cobrado: ${fmt(totCob)} Bs</div>
          <div>Utilidad: <span style="color:${util>=0?'#4ADE80':'#F87171'}">${fmt(util)}</span></div>
          <div style="margin-top:4px;color:rgba(255,255,255,.3)">💾 Autoguardado</div>
        </div>
      </div>
      <div class="cnt">${main}</div>
    </div>`;
}

re();
</script>
</body>
</html>
