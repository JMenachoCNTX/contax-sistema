// ══ NOTAS EEFF ══════════════════════════════════════════
function renderNotasEEFF(c){
  const cfg=emp().cfg;const tr=emp().traspaso;
  const{gs,tI,tG,util,tA,tP,tPT}=c;
  const year=cfg.fechaFin?cfg.fechaFin.split('-')[0]:'';
  const caja=r2(gs('111001001'));const banco=r2(gs('111002001'));
  const cfIva=r2(gs('116001001'));const iuePagar=r2(gs('214006001'));
  
  function nota(num,titulo,contenido){
    return '<div style="margin-bottom:16px;break-inside:avoid">'+
      '<div style="font-size:13px;font-weight:700;color:#031740;border-bottom:2px solid #031740;padding-bottom:4px;margin-bottom:8px">'+
        'NOTA '+num+'. '+titulo.toUpperCase()+
      '</div>'+
      '<div style="font-size:11px;line-height:1.6;color:#0D0D0D">'+contenido+'</div>'+
    '</div>';
  }
  function row2(a,b){return '<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #eee"><span>'+a+'</span><span><strong>'+b+'</strong></span></div>';}

  return '<div style="max-width:800px">'+
    '<div style="text-align:center;margin-bottom:24px">'+
      '<div style="font-size:16px;font-weight:700;color:#031740">'+cfg.razonSocial+'</div>'+
      '<div style="font-size:12px;color:#555">NIT: '+cfg.nit+' | Actividad: '+cfg.actividad+'</div>'+
      '<div style="font-size:14px;font-weight:600;color:#031740;margin-top:8px">NOTAS A LOS ESTADOS FINANCIEROS</div>'+
      '<div style="font-size:11px;color:#555">Correspondientes al período finalizado al '+isoToLocal(cfg.fechaFin)+'</div>'+
      '<div style="font-size:11px;color:#555">(Expresado en Bolivianos)</div>'+
    '</div>'+

    nota(1,'Información General',
      '<p>'+cfg.razonSocial+' es una empresa establecida en Bolivia, registrada bajo el NIT '+cfg.nit+
      '. Su actividad principal consiste en '+cfg.actividad+'. Los presentes estados financieros corresponden al período comprendido entre el '+
      isoToLocal(cfg.fechaInicio)+' y el '+isoToLocal(cfg.fechaFin)+' (Gestión '+year+').</p>'
    )+

    nota(2,'Bases de Preparación',
      '<p>Los estados financieros han sido preparados de acuerdo con los Principios de Contabilidad Generalmente Aceptados (PCGA) '+
      'vigentes en Bolivia y las normas establecidas por el Servicio de Impuestos Nacionales (SIN). Los valores están expresados en Bolivianos (Bs.).</p>'+
      '<p style="margin-top:4px">La empresa aplica el método del costo histórico para la valuación de sus activos, ajustados por la variación de la Unidad de Fomento a la Vivienda (UFV) '+
      'conforme lo establece la legislación tributaria boliviana.</p>'
    )+

    nota(3,'Principales Políticas Contables',
      '<p><strong>a) Efectivo y equivalentes:</strong> Se registran a su valor nominal en moneda nacional.</p>'+
      '<p style="margin-top:3px"><strong>b) Crédito Fiscal IVA:</strong> Representan el IVA soportado en compras, aplicable como crédito contra el Débito Fiscal generado en ventas (Ley 843).</p>'+
      '<p style="margin-top:3px"><strong>c) Activos Fijos:</strong> Se registran al costo de adquisición, actualizados con la variación UFV del período. La depreciación se calcula por el método de línea recta a las tasas establecidas por el SIN.</p>'+
      '<p style="margin-top:3px"><strong>d) Impuesto a las Transacciones (IT):</strong> Se liquida mensualmente a la tasa del 3% sobre ingresos brutos.</p>'+
      '<p style="margin-top:3px"><strong>e) Impuesto al Valor Agregado (IVA):</strong> Se liquida mensualmente. El IVA incluido en ventas (DF) se compensa con el CF de compras. La diferencia a favor se cancela con caja.</p>'+
      '<p style="margin-top:3px"><strong>f) Impuesto sobre las Utilidades (IUE):</strong> Se aplica el 25% sobre la utilidad tributaria de la gestión.</p>'
    )+

    nota(4,'Efectivo y Equivalentes de Efectivo',
      row2('Caja Moneda Nacional',fmt(caja)+' Bs')+
      row2('Banco',fmt(banco)+' Bs')+
      '<div style="display:flex;justify-content:space-between;padding:5px 0;border-top:2px solid #031740;font-weight:700"><span>TOTAL</span><span>'+fmt(r2(caja+banco))+' Bs</span></div>'+
      '<p style="margin-top:6px;font-size:10px;color:#555">El saldo de caja corresponde al efectivo disponible al cierre del período '+isoToLocal(cfg.fechaFin)+'. Los fondos en bancos están depositados en entidades financieras bolivianas reguladas por la ASFI.</p>'
    )+

    nota(5,'Crédito Fiscal IVA',
      row2('Saldo inicial CF IVA',fmt(pn(tr.cfIva||0))+' Bs')+
      row2('CF generado en compras del período',fmt(r2(cfIva-pn(tr.cfIva||0)))+' Bs')+
      '<div style="display:flex;justify-content:space-between;padding:5px 0;border-top:2px solid #031740;font-weight:700"><span>SALDO CF IVA AL CIERRE</span><span>'+fmt(cfIva)+' Bs</span></div>'+
      '<p style="margin-top:6px;font-size:10px;color:#555">El Crédito Fiscal IVA proviene del 13% del monto neto de las compras gravadas. Se aplica mensualmente contra el Débito Fiscal. El saldo al cierre está disponible para compensaciones futuras.</p>'
    )+

    nota(6,'Activos Fijos',
      '<p>Los activos fijos se detallan en el Cuadro de Activos Fijos adjunto. Todos los bienes son propiedad de la empresa y se encuentran libres de gravámenes. Las tasas de depreciación aplicadas son las establecidas por el SIN:</p>'+
      '<div style="margin-top:6px">'+
      row2('Vehículos','20% anual')+row2('Muebles y Enseres','10% anual')+
      row2('Equipos de Computación','25% anual')+row2('Equipos de Comunicación','20% anual')+
      row2('Equipo de Oficina','10% anual')+row2('Equipo Electrónico','25% anual')+'</div>'
    )+

    nota(7,'Impuestos por Pagar',
      row2('Débito Fiscal IVA',fmt(gs('214001001'))+' Bs')+
      row2('IT Por Pagar',fmt(gs('214004001'))+' Bs')+
      row2('IUE Por Pagar',fmt(iuePagar)+' Bs')+
      '<div style="display:flex;justify-content:space-between;padding:5px 0;border-top:2px solid #031740;font-weight:700"><span>TOTAL OBLIGACIONES TRIBUTARIAS</span><span>'+fmt(r2(gs('214001001')+gs('214004001')+iuePagar))+' Bs</span></div>'+
      (r2(gs('214001001')+gs('214004001')+iuePagar)===0?
        '<p style="margin-top:6px;font-size:10px;color:#555">Al cierre del período la empresa no registra obligaciones tributarias pendientes (Bs 0,00). Todos los impuestos del período han sido declarados y pagados oportunamente.</p>':
        '<p style="margin-top:6px;font-size:10px;color:#555">Corresponden a las obligaciones tributarias al cierre del período, pendientes de declaración y pago ante el Servicio de Impuestos Nacionales (SIN).</p>')
    )+

    nota(8,'Resultado de la Gestión',
      row2('Total Ingresos',fmt(tI)+' Bs')+
      row2('(-) Total Gastos',fmt(tG)+' Bs')+
      '<div style="display:flex;justify-content:space-between;padding:5px 0;border-top:2px solid #031740;font-weight:700"><span>'+(util>=0?'UTILIDAD':'PÉRDIDA')+' DE LA GESTIÓN</span><span>'+fmt(Math.abs(util))+' Bs</span></div>'+
      (tI===0?
        '<p style="margin-top:6px;font-size:10px;color:#F59E0B">⚠ No se han registrado ingresos para este período. Verifique que las facturas de ventas estén correctamente cargadas en el sistema.</p>':
        '<p style="margin-top:6px;font-size:10px;color:#555">El resultado de la gestión ha sido determinado conforme a los principios contables y tributarios bolivianos, aplicados consistentemente con respecto a ejercicios anteriores. '+(util>=0?'La empresa generó una utilidad de Bs '+fmt(util)+' para la gestión '+year+'.':'La empresa registra una pérdida de Bs '+fmt(Math.abs(util))+', la cual podrá ser compensada con utilidades futuras en los siguientes cuatro ejercicios.')+'</p>')
    )+

    nota(9,'Hechos Posteriores',
      '<p>Al momento de la preparación de estos estados financieros, la administración de '+cfg.razonSocial+
      ' no tiene conocimiento de hechos ocurridos con posterioridad al cierre del período ('+isoToLocal(cfg.fechaFin)+
      ') que pudieran afectar significativamente los presentes estados financieros.</p>'
    )+

    '<div style="margin-top:32px;display:grid;grid-template-columns:1fr 1fr;gap:40px;break-inside:avoid">'+
      '<div style="text-align:center">'+
        '<div style="border-top:2px solid #031740;padding-top:8px;font-weight:700;font-size:12px;color:#031740">'+cfg.contadorNombre+'</div>'+
        '<div style="font-size:10px;color:#555">CI: '+cfg.contadorCI+'</div>'+
        '<div style="font-size:10px;color:#555">Contador</div>'+
      '</div>'+
      '<div style="text-align:center">'+
        '<div style="border-top:2px solid #031740;padding-top:8px;font-weight:700;font-size:12px;color:#031740">'+cfg.razonSocial+'</div>'+
        '<div style="font-size:10px;color:#555">NIT: '+cfg.nit+'</div>'+
        '<div style="font-size:10px;color:#555">Representante Legal</div>'+
      '</div>'+
    '</div>'+
  '</div>';
}

// ══ EXPORT WORD (Notas en HTML-Word format) ═════════════
function exportNotasWord(){
  const c=calcAll();const cfg=emp().cfg;
  const body=renderNotasEEFF(c);
  const wordHtml='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word">'+
    '<head><meta charset="utf-8">'+
    '<style>body{font-family:Calibri,sans-serif;font-size:11pt;margin:2.5cm}h1{font-size:16pt;color:#031740}'+
    'table{border-collapse:collapse;width:100%}td{padding:4pt 6pt}</style></head>'+
    '<body>'+body+'</body></html>';
  const blob=new Blob([wordHtml],{type:'application/msword'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='Notas_EEFF_'+cfg.razonSocial+'_'+cfg.gestion+'.doc';
  a.click();URL.revokeObjectURL(a.href);
}



// ─ PDF Flujo de Efectivo ─
function pdfFlujo(c){
  var cfg=emp().cfg;
  var util=c.util,dep=c.dep,gUFV=c.gUFV,iUFV=c.iUFV,vCF=c.vCF,vIC=c.vIC,vDF=c.vDF,vIT=c.vIT,vIUE=c.vIUE;
  var inv=c.inv,fFin=c.fFin,fOp=c.fOp,difF=c.difF,sI=c.sI,sF=c.sF;
  var rows='<tr style="background:#031740;color:#fff"><td colspan="2" style="padding:6px 8px;font-weight:700">ACTIVIDADES DE OPERACIÓN</td></tr>'+
    '<tr><td style="padding:3px 6px 3px 18px">Utilidad de la Gestión</td><td style="text-align:right;font-family:monospace">'+fmt(util)+'</td></tr>'+
    '<tr><td style="padding:3px 6px 3px 18px">+ Depreciaciones (no monetario)</td><td style="text-align:right;font-family:monospace">'+fmt(dep)+'</td></tr>'+
    (gUFV?'<tr><td style="padding:3px 6px 3px 18px">+ Gasto UFV (no monetario)</td><td style="text-align:right;font-family:monospace">'+fmt(gUFV)+'</td></tr>':'')+
    (iUFV?'<tr><td style="padding:3px 6px 3px 18px">- Ingreso UFV (no monetario)</td><td style="text-align:right;font-family:monospace">'+fmt(-iUFV)+'</td></tr>':'')+
    (vCF?'<tr><td style="padding:3px 6px 3px 18px">Variación CF IVA</td><td style="text-align:right;font-family:monospace">'+fmt(-vCF)+'</td></tr>':'')+
    (vDF?'<tr><td style="padding:3px 6px 3px 18px">Variación DF IVA</td><td style="text-align:right;font-family:monospace">'+fmt(vDF)+'</td></tr>':'')+
    (vIT?'<tr><td style="padding:3px 6px 3px 18px">Variación IT Por Pagar</td><td style="text-align:right;font-family:monospace">'+fmt(vIT)+'</td></tr>':'')+
    (vIUE?'<tr><td style="padding:3px 6px 3px 18px">Variación IUE Por Pagar</td><td style="text-align:right;font-family:monospace">'+fmt(vIUE)+'</td></tr>':'')+
    (vIC?'<tr><td style="padding:3px 6px 3px 18px">Variación IUE A Compensar</td><td style="text-align:right;font-family:monospace">'+fmt(-vIC)+'</td></tr>':'')+
    '<tr style="background:#E2E8F0"><td style="padding:5px 6px;font-weight:700">TOTAL ACTIVIDADES DE OPERACIÓN</td><td style="text-align:right;padding:5px 8px;font-weight:700;font-family:monospace">'+fmt(fOp)+'</td></tr>'+
    (inv?'<tr style="background:#142740;color:#fff"><td colspan="2" style="padding:6px 8px;font-weight:700">ACTIVIDADES DE INVERSIÓN</td></tr>'+
    '<tr><td style="padding:3px 6px 3px 18px">Adquisición de Activos Fijos</td><td style="text-align:right;font-family:monospace">'+fmt(inv)+'</td></tr>':'')+
    (fFin?'<tr style="background:#142740;color:#fff"><td colspan="2" style="padding:6px 8px;font-weight:700">ACTIVIDADES DE FINANCIAMIENTO</td></tr>'+
    '<tr><td style="padding:3px 6px 3px 18px">Variación Préstamos</td><td style="text-align:right;font-family:monospace">'+fmt(fFin)+'</td></tr>':'')+
    '<tr style="background:#E2E8F0"><td style="padding:5px 6px;font-weight:700">VARIACIÓN NETA DE EFECTIVO</td><td style="text-align:right;padding:5px 8px;font-weight:700;font-family:monospace">'+fmt(difF)+'</td></tr>'+
    '<tr><td style="padding:3px 6px">Saldo inicial de efectivo</td><td style="text-align:right;font-family:monospace">'+fmt(sI)+'</td></tr>'+
    '<tr style="background:#031740;color:#fff"><td style="padding:6px 8px;font-weight:700">SALDO FINAL DE EFECTIVO</td><td style="text-align:right;padding:6px 8px;font-weight:700;font-family:monospace">'+fmt(sF)+'</td></tr>';
  return pdfHeader('Flujo de Efectivo')+
    '<div style="text-align:center;margin-bottom:10px">'+
      '<div style="font-size:14px;font-weight:700;color:#031740">ESTADO DE FLUJO DE EFECTIVO</div>'+
      '<div style="font-size:10px;color:#555">'+cfg.razonSocial+' | '+isoToLocal(cfg.fechaInicio)+' al '+isoToLocal(cfg.fechaFin)+' | (Método Indirecto)</div>'+
    '</div>'+
    '<table><tbody>'+rows+'</tbody></table>'+
    '<div style="margin-top:8px;padding:5px 8px;background:'+(r2(difF)===0||r2(sF-c.cajaMN)===0?'#F0FDF4':'#FEF2F2')+';border-radius:4px;font-size:10px">'+
      'Saldo final calculado: '+fmt(sF)+' Bs | Caja M/N en BG: '+fmt(c.cajaMN)+' Bs | '+(r2(sF-c.cajaMN)===0?'✓ CUADRADO':'✗ Diferencia: '+fmt(r2(sF-c.cajaMN)))+
    '</div>'+pdfFirmas(c);
}

// ─ PDF Evolución de Patrimonio ─
function pdfPatrimonio(c){
  var cfg=emp().cfg;var tr=emp().traspaso;var ajC=c.ajC;var util=c.util;
  var capA=r2(pn(tr.capitalSocial)+pn(tr.ajusteCapital)),resA=r2(pn(tr.resAcum));
  var capF=r2(capA+ajC);
  var patTotal=r2(capF+resA+util);
  return pdfHeader('Evolución del Patrimonio')+
    '<div style="text-align:center;margin-bottom:10px">'+
      '<div style="font-size:14px;font-weight:700;color:#031740">ESTADO DE EVOLUCIÓN DEL PATRIMONIO</div>'+
      '<div style="font-size:10px;color:#555">'+cfg.razonSocial+' | Gestión '+cfg.gestion+'</div>'+
    '</div>'+
    '<table><thead style="background:#031740;color:#fff"><tr>'+
      '<th>CONCEPTO</th><th style="text-align:right">CAPITAL</th>'+
      '<th style="text-align:right">RESULT. ACUM.</th>'+
      '<th style="text-align:right">UTILIDAD</th><th style="text-align:right">TOTAL</th></tr></thead>'+
    '<tbody>'+
      '<tr style="background:#E2E8F0"><td style="font-weight:700;padding:5px 6px">Saldo al INICIO</td>'+
        '<td style="text-align:right;font-family:monospace">'+fmt(capA)+'</td>'+
        '<td style="text-align:right;font-family:monospace">'+fmt(resA)+'</td>'+
        '<td style="text-align:right;font-family:monospace">0,00</td>'+
        '<td style="text-align:right;font-family:monospace;font-weight:700">'+fmt(r2(capA+resA))+'</td></tr>'+
      (ajC?'<tr><td style="padding:3px 6px 3px 18px">+ Ajuste capital con UFV</td>'+
        '<td style="text-align:right;font-family:monospace">'+fmt(ajC)+'</td>'+
        '<td style="text-align:right">—</td><td style="text-align:right">—</td>'+
        '<td style="text-align:right;font-family:monospace">'+fmt(ajC)+'</td></tr>':'')+
      '<tr><td style="padding:3px 6px 3px 18px">+ Utilidad del período</td>'+
        '<td style="text-align:right">—</td><td style="text-align:right">—</td>'+
        '<td style="text-align:right;font-family:monospace">'+fmt(util)+'</td>'+
        '<td style="text-align:right;font-family:monospace">'+fmt(util)+'</td></tr>'+
    '</tbody>'+
    '<tfoot><tr style="background:#031740;color:#fff">'+
      '<td style="padding:6px 8px;font-weight:700">Saldo al FINAL del período</td>'+
      '<td style="text-align:right;font-family:monospace;padding:6px 8px">'+fmt(capF)+'</td>'+
      '<td style="text-align:right;font-family:monospace;padding:6px 8px">'+fmt(resA)+'</td>'+
      '<td style="text-align:right;font-family:monospace;padding:6px 8px">'+fmt(util)+'</td>'+
      '<td style="text-align:right;font-family:monospace;padding:6px 8px;font-weight:700">'+fmt(patTotal)+'</td>'+
    '</tr></tfoot></table>'+pdfFirmas(c);
}


// ═══ MAIN RENDER FUNCTION ════════════════════════════════
function re(){
  const _access=checkAccess();
  if(_access===null) return;
  if(!_access){document.getElementById('root').innerHTML=renderAccessGate();return;}
  try{
    if(S.showLogin||!getCurrentUser()){document.getElementById('root').innerHTML=renderLogin();return;}
  }catch(e){document.getElementById('root').innerHTML=renderLogin();return;}
  const c=calcAll();const{bgOK,ssOK,fOK,util}=c;const cfg=emp().cfg;
  const navSecs=[
    {sec:'Datos de Entrada',items:[
      {id:'splash',ic:'🏠',lb:'Inicio'},
      {id:'config',ic:'🏢',lb:'Configuración'},
      {id:'apertura',ic:'📂',lb:'Asiento de Apertura'},
      {id:'rcv',ic:'🧾',lb:'RCV Compras'},
      {id:'ingresos',ic:'💰',lb:'Ingresos'},
      {id:'compensaciones',ic:'⚖️',lb:'Compensaciones'},
      {id:'otros',ic:'📝',lb:'Otros Asientos'},
      {id:'verificaciones',ic:'✅',lb:'Verificaciones'},
    ]},
    {sec:'Resultados',items:[
      {id:'ee',ic:'📊',lb:'Estados Financieros'},
      {id:'formatoss',ic:'📄',lb:'Formato S&S'},
      {id:'cuadroaf',ic:'🏭',lb:'Cuadro A.F.'},
      {id:'comprobantes',ic:'🗂️',lb:'Comprobantes'},
      {id:'notas',ic:'📋',lb:'Notas EEFF'},
    ]},
    {sec:'Análisis',items:[
      {id:'tributario',ic:'🧾',lb:'Resumen Tributario'},
      {id:'reporte',ic:'📋',lb:'Reporte'},
      {id:'graficos',ic:'📈',lb:'Gráficos'},
    ]},
    {sec:'Configuración',items:[
      {id:'plan',ic:'📋',lb:'Plan de Cuentas'},
      {id:'nits',ic:'🔍',lb:"NIT's"},
      {id:'ufvs',ic:'📈',lb:"UFV's"},
    ]},
    {sec:'Sistema',items:[
      {id:'listaeeff',ic:'📁',lb:'Lista EEFF'},
      {id:'dashboard',ic:'🚀',lb:'Dashboard'},
      {id:'usuarios',ic:'👥',lb:'Usuarios'},
      {id:'iaapi',ic:'🤖',lb:'CONTAX IA'},
    ]},
  ];
  const navHTML=navSecs.map(sec=>'<div class="ns">'+sec.sec+'</div>'+sec.items.map(i=>ni(i.id,i.ic,i.lb)).join('')).join('');
  let main='<div class="card" style="text-align:center;padding:40px;color:#888">Selecciona una sección</div>';
  try{
    if(S.tab==='splash')main=renderSplash();
    else if(S.tab==='config')main=renderConfig(c);
    else if(S.tab==='apertura')main=renderApertura();
    else if(S.tab==='rcv')main=renderRCV();
    else if(S.tab==='ingresos')main=renderIngresos();
    else if(S.tab==='compensaciones')main=renderCompensaciones(c);
    else if(S.tab==='otros')main=renderOtrosAsientos();
    else if(S.tab==='verificaciones')main=renderVerificaciones(c);
    else if(S.tab==='ee')main=renderEE(c);
    else if(S.tab==='formatoss')main=renderFormatoSS(c);
    else if(S.tab==='cuadroaf')main=renderCuadroAF();
    else if(S.tab==='notas')main=renderNotasEEFF(c);
    else if(S.tab==='comprobantes')main=renderComprobantes(c);
    else if(S.tab==='tributario')main=renderTributario();
    else if(S.tab==='reporte')main=renderReporte(c);
    else if(S.tab==='graficos')main=renderGraficos(c);
    else if(S.tab==='plan')main=renderPlan();
    else if(S.tab==='nits')main=renderNITs();
    else if(S.tab==='ufvs')main=renderUFVs();
    else if(S.tab==='listaeeff')main=renderListaEEFF();
    else if(S.tab==='dashboard')main=renderDashboard(c);
    else if(S.tab==='usuarios')main=renderUsuarios();
    else if(S.tab==='iaapi')main=renderIAApi(c);
  }catch(tabErr){
    main='<div class="card ir"><strong>Error en '+S.tab+':</strong><br><code>'+tabErr.message+'</code><br><button class="btn" style="margin-top:8px" onclick="S.tab=\'splash\';re()">← Inicio</button></div>';
  }
  document.getElementById('root').innerHTML=
    '<div id="export-bar">'+
    '<span style="color:#fff;font-size:11px;font-weight:600;margin-right:4px">📤 Exportar:</span>'+
    '<button class="export-btn" onclick="exportPDFAll()" title="Descarga PDF completo con carátula">📄 PDF Completo</button>'+
    '<button class="export-btn" onclick="exportPDFSingle(\'ee\',\'Estados Financieros\')" title="Solo EE.FF.">📊 EEFF</button>'+
    '<button class="export-btn" onclick="exportPDFSingle(\'notas\',\'Notas EEFF\')" title="Solo Notas">📋 Notas</button>'+
    '<button class="export-btn" onclick="exportNotasWord()" title="Notas en Word">📝 Word</button>'+
    '<button class="export-btn" onclick="exportPDFSingle(\'tributario\',\'Resumen Tributario\')" title="Tributario">🧾 Tributario</button>'+
    '</div>'+
    (S.showImportPreview?renderImportPreview():(S.showEmp?renderEmpModal():''))+
    '<div class="hdr">'+
    '<button class="nav-toggle" onclick="S.navOpen=!S.navOpen;re()" title="Menú">'+(S.navOpen?'☰':'▶')+'</button>'+
    '<div onclick="S.tab=\'splash\';re()" style="cursor:pointer;background:rgba(255,255,255,.12);border-radius:6px;padding:2px 4px;display:flex;align-items:center;height:36px"><img src="'+CONTAX_ISOTIPO+'" style="height:30px;width:auto;filter:brightness(0) invert(1);opacity:.9"/></div>'+
    '<div><div style="font-size:14px;font-weight:700">CONTAX</div>'+
    '<div style="font-size:10px;opacity:.7">'+(cfg.razonSocial||'Sistema Contable')+(cfg.razonSocial?' | NIT: '+cfg.nit+' | '+cfg.gestion:'')+'</div></div>'+
    '<div class="hdr-r">'+
    '<div style="font-size:10px;display:flex;gap:8px">BG:<span class="'+(bgOK?'ok':'err')+'">'+(bgOK?'✓':'✗')+'</span> S&S:<span class="'+(ssOK?'ok':'err')+'">'+(ssOK?'✓':'✗')+'</span> Flujo:<span class="'+(fOK?'ok':'err')+'">'+(fOK?'✓':'✗')+'</span></div>'+
    '<span style="font-size:11px;color:rgba(255,255,255,.6)">👤 '+(getCurrentUser()?.nombre||getUser())+'</span>'+
    '<button class="btn" onclick="S.showEmp=true;re()">🏢 '+(cfg.razonSocial||'Empresas')+' ▾</button>'+
    '<button onclick="logout()" style="background:rgba(255,255,255,.1);color:#fff;border:none;border-radius:5px;padding:5px 10px;font-size:11px;cursor:pointer">Salir</button>'+
    '<button class="btn-orange" onclick="exportJSON()">📤 JSON</button>'+
    '<button class="btn-green" onclick="exportXL()">📊 Excel</button>'+
    '</div></div>'+
    '<div class="layout">'+
    '<div class="nav'+(S.navOpen?'':' collapsed')+'">'+
    (S.navOpen? navHTML+
    '<div class="nsumm">'+
      '<div>'+(emp().rcvData||[]).length+' compras</div>'+
      '<div>'+(emp().ventasData||[]).length+' ventas</div>'+
      '<div>Utilidad: <span style="color:'+(util>=0?'#4ADE80':'#F87171')+'">'+fmt(util)+'</span></div>'+
      '<div style="margin-top:4px;color:rgba(255,255,255,.3)">💾 Auto</div></div>'
    : '')+
    '</div>'+
    '<div class="cnt">'+main+'</div></div>'+renderFloatChat();
}
re();
</script>
